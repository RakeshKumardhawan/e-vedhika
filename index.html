<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(120deg,#89f7fe,#66a6ff);
}
h2{text-align:center;color:white;padding:10px;}
.container{display:grid;grid-template-columns:220px 1fr 280px;gap:15px;padding:15px;}
.glass{
  background:rgba(255,255,255,0.2);
  backdrop-filter: blur(15px);
  border-radius:15px;
  padding:15px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
.post{background:white;margin:8px 0;padding:10px;border-radius:10px;}
input,textarea{width:100%;margin:5px 0;padding:8px;border-radius:8px;border:1px solid #ccc;}
button{padding:8px 12px;border:none;background:#4CAF50;color:white;border-radius:8px;cursor:pointer;}
.scroll-box{height:120px;overflow:hidden;}
</style>
</head>

<body>

<h2>🌐 E-Vedhika</h2>

<div class="container">

<div class="glass">
<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>

<h4>📌 Problems</h4>
<button onclick="showProblemPost()">+ Post Problem</button>
<div id="problemForm" style="display:none;">
<input id="ptitle">
<textarea id="pcontent"></textarea>
<button onclick="addProblem()">Submit</button>
</div>
<div id="problemsBox"></div>

<h4>🛠 Fix Errors</h4>
<div id="solvedBox"></div>
</div>

<div class="glass">
<h3>New Post</h3>
<input id="title">
<textarea id="content"></textarea>
<button onclick="addPost()">Post</button>
<div id="posts"></div>
</div>

<div class="glass">
<h3>Login / Signup</h3>
<input id="email">
<input id="password" type="password">

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

<p id="userInfo"></p>

<hr>

<h3>Chat</h3>
<div id="chatMessages" style="height:200px;overflow:auto;"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
getFirestore, collection, addDoc, getDocs, serverTimestamp, onSnapshot 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { 
getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);
const auth = getAuth(app);

let currentUser=null;

/* 🔥 AUTH STATE */
onAuthStateChanged(auth,(user)=>{
if(user){
currentUser=user;
userInfo.innerText="Logged: "+user.email;
}else{
userInfo.innerText="Not logged";
}
});

/* LOGIN */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
alert("Login success");
}catch(e){
alert(e.message);
}
};

/* SIGNUP + SAVE ROLE */
window.signup=async()=>{
try{
let res = await createUserWithEmailAndPassword(auth,email.value,password.value);

await addDoc(collection(db,"users"),{
email:res.user.email,
role:"user"
});

alert("Signup success");
}catch(e){
alert(e.message);
}
};

/* POSTS */
window.addPost=async()=>{
if(!currentUser){alert("Login required");return;}

await addDoc(collection(db,"posts"),{
title:title.value,
content:content.value,
status:"Approved",
createdAt:serverTimestamp()
});

loadPosts();
};

/* PROBLEM */
window.showProblemPost=()=>problemForm.style.display="block";

window.addProblem=async()=>{
await addDoc(collection(db,"problems"),{
title:ptitle.value,
content:pcontent.value,
status:"Pending",
createdAt:serverTimestamp()
});
alert("Submitted");
};

/* CHAT */
window.sendMsg=async()=>{
await addDoc(collection(db,"chat"),{
message:chatInput.value,
createdAt:serverTimestamp()
});
chatInput.value="";
};

/* LOAD CHAT */
function loadChat(){
onSnapshot(collection(db,"chat"),snap=>{
chatMessages.innerHTML="";
snap.forEach(d=>{
chatMessages.innerHTML+=`<div>${d.data().message}</div>`;
});
});
}

/* APPROVED SCROLL */
async function loadApproved(){
let qs=await getDocs(collection(db,"suggestions"));
approvedBox.innerHTML="";
qs.forEach(d=>{
approvedBox.innerHTML+=`<div class="post">${d.data().suggestion}</div>`;
});

let pos=0;
setInterval(()=>{
pos++;
approvedBox.scrollTop=pos;
if(pos>=approvedBox.scrollHeight-approvedBox.clientHeight) pos=0;
},40);
}

/* POSTS LOAD */
async function loadPosts(){
let qs=await getDocs(collection(db,"posts"));
posts.innerHTML="";
qs.forEach(d=>{
let x=d.data();
posts.innerHTML+=`<div class="post">${x.title}<br>${x.content}</div>`;
});
}

/* INIT */
loadPosts();
loadChat();
loadApproved();

</script>

</body>
</html>
