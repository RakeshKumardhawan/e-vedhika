<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#eef2f7;text-align:center;}
.header{background:#0077b6;color:white;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);}
button{background:#0077b6;color:white;padding:8px;border:none;border-radius:5px;}
.logout{position:absolute;top:10px;right:10px;}
</style>

<script>
if(localStorage.getItem("login")!=="yes"){
location.href="login.html";
}
</script>

</head>

<body>

<button class="logout" onclick="logout()">Logout</button>

<div class="header">
<h2>🌐 Welcome to E-Vedhika</h2>
<p>All E-Panchayat solutions in one place</p>
</div>

<div class="grid">

<div class="card">
<h3>Problems</h3>
<button onclick="location.href='problems.html'">Open</button>
</div>

<div class="card">
<h3>Updates</h3>
<button onclick="location.href='updates.html'">Open</button>
</div>

<div class="card">
<h3>Help</h3>
<button onclick="location.href='suggestion.html'">Open</button>
</div>

</div>

<script>
function logout(){
localStorage.removeItem("login");
location.href="login.html";
}
</script>

</body>
</html>
