<!DOCTYPE html>
<html>
<script>
if(localStorage.getItem("login") !== "yes"){
  window.location.href = "login.html";
}
</script>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7;text-align:center;}
.header{background:#0077b6;color:white;padding:20px;}
.search input{width:70%;padding:10px;margin:15px;border-radius:5px;border:1px solid #ccc;}
.grid{display:flex;flex-wrap:wrap;justify-content:center;}
.card{background:white;width:250px;margin:10px;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);}
button{background:#0077b6;color:white;padding:8px;border:none;border-radius:5px;}
</style>
</head>

<body>

<div class="header">
<h2>🌐 Welcome to E-Vedhika</h2>
<p>All E-Panchayat solutions in one place</p>
</div>

<div class="search">
<input placeholder="Search...">
</div>

<div class="grid">

<div class="card">
<h3>Problems</h3>
<button onclick="location.href='problems.html'">Open</button>
</div>

<div class="card">
<h3>Updates</h3>
<button onclick="location.href='updates.html'">Open</button>
</div>

<div class="card">
<h3>Help</h3>
<button onclick="location.href='suggestion.html'">Open</button>
</div>

<div class="card">
<h3>📑 Schemes</h3>
<div id="schemesData">Loading...</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});
const db = getFirestore(app);

async function loadSchemes(){
let qs = await getDocs(collection(db,"posts"));
let html="";
qs.forEach(d=>{
let x=d.data();
if(x.userType==="admin" && x.status==="Approved"){
html+=`<div><b>${x.title}</b><br>${x.content}</div>`;
}
});
document.getElementById("schemesData").innerHTML = html || "No updates";
}
loadSchemes();
</script>

</body>
</html>
