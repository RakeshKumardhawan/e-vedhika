<!DOCTYPE html>
<html>
<body>

<h2>E-Vedhika</h2>
<button onclick="goProfile()">Profile</button>
<button onclick="goAdmin()">Admin</button>

<textarea id="content"></textarea><br>
<input type="file" id="img"><br>
<button onclick="addPost()">Post</button>

<hr>

<div id="feed"></div>

<script type="module">

import { auth, db, storage } from "./firebase.js";
import { collection, addDoc, getDocs, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

let uid="", username="", role="user", posts=[];

auth.onAuthStateChanged(async user=>{
  if(user){
    uid=user.uid;

    let u=await getDocs(collection(db,"users"));
    u.forEach(d=>{
      if(d.id===uid){
        username=d.data().username;
        role=d.data().role;
      }
    });
  }
  load();
});

async function load(){
  let snap=await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data(); x.id=d.id;
    posts.push(x);
  });
  render();
}

function render(){
  let html="";

  posts.filter(p=>!p.parentId && p.status==="Approved")
  .reverse().forEach(p=>{

    html+=`
    <div style="border:1px solid #ccc;padding:10px;margin:10px">

    <b>${p.username}</b><br>
    ${p.content}<br>

    ${p.image ? `<img src="${p.image}" width="100%">`:""}

    <br>

    <button onclick="showBox('${p.id}')">Comment</button>
    `;

    if(role==="admin"){
      html+=`<button onclick="approve('${p.id}')">Approve</button>`;
    }

    html+=`
    <div id="cbox-${p.id}" style="display:none">
      <input id="c-${p.id}">
      <button onclick="addComment('${p.id}')">Send</button>
    </div>
    `;

    posts.filter(c=>c.parentId===p.id && c.status==="Approved")
    .forEach(c=>{
      html+=`<div><b>${c.username}</b>: ${c.content}</div>`;
    });

    html+=`</div>`;
  });

  feed.innerHTML=html;
}

window.addPost = async ()=>{
  if(!auth.currentUser) return alert("Login");

  let imgUrl="";
  if(img.files[0]){
    let r=ref(storage,"posts/"+Date.now());
    await uploadBytes(r,img.files[0]);
    imgUrl=await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    image:imgUrl,
    parentId:null,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  load();
};

window.showBox=id=>{
  document.getElementById("cbox-"+id).style.display="block";
};

window.addComment=async(id)=>{
  let t=document.getElementById("c-"+id).value;

  await addDoc(collection(db,"posts"),{
    content:t,
    parentId:id,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  load();
};

window.approve=async(id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

window.goProfile=()=>location.href="profile.html";
window.goAdmin=()=>location.href="admin.html";

</script>
</body>
</html>
