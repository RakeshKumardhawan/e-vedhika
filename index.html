<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#89f7fe,#66a6ff);
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  color:white;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:220px 1fr 280px;
  gap:15px;
  padding:15px;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.25);
  backdrop-filter: blur(15px);
  border-radius:15px;
  padding:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

/* SIDEBAR */
.sidebar div{
  background:rgba(255,255,255,0.3);
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

/* SCROLL */
.scroll-box{
  height:120px;
  overflow:hidden;
}

.scroll-item{
  background:white;
  padding:6px;
  margin:5px 0;
  border-radius:8px;
  font-size:12px;
}

/* POST */
.post-box{
  background:white;
  padding:15px;
  border-radius:12px;
}

.post{
  background:white;
  margin:10px 0;
  padding:12px;
  border-radius:10px;
}

/* LOGIN */
.login-box input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{
  background:#ff6b6b;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#ff3b3b;
}

/* CHAT */
.chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff6b6b;
  color:white;
  padding:12px;
  border-radius:50px;
}

@media(max-width:800px){
  .container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
  <h2>🌐 E-Vedhika</h2>
  <p>All problem solutions at one place</p>
</div>

<div class="container">

<!-- LEFT -->
<div class="glass sidebar">

<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>

<div>📌 Problems</div>
<div>🛠 Fix Errors</div>

</div>

<!-- CENTER -->
<div class="glass">

<h3>✨ New Post</h3>

<div class="post-box">
<input id="title" placeholder="Title">
<textarea id="content" placeholder="Write something..."></textarea>
<button onclick="addPost()">Post</button>
</div>

<h3>📊 Recent Posts</h3>
<div id="posts"></div>

</div>

<!-- RIGHT LOGIN -->
<div class="glass">

<h3>🔐 Login</h3>

<div class="login-box">
<input id="email" placeholder="User ID">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p onclick="signup()" style="cursor:pointer;color:blue;">Signup</p>
<p onclick="forgot()" style="cursor:pointer;color:red;">Forgot Password</p>
</div>

<hr>

<div>📢 Union Updates</div>
<div>💬 Chat</div>

</div>

</div>

<div class="chatbot">🤖</div>

<!-- GOOGLE TRANSLATE -->
<div style="position:fixed;bottom:10px;left:10px;">
<div id="google_translate_element"></div>
</div>

<script>
function googleTranslateElementInit(){
new google.translate.TranslateElement(
{pageLanguage:'en',includedLanguages:'en,hi,te'},
'google_translate_element'
);
}

/* LOGIN (dummy for now) */
function login(){
let e=email.value;
let p=password.value;

if(!e||!p){
alert("Enter details");
return;
}

alert("Login Success (Demo)");
}

function signup(){
alert("Signup system next step");
}

function forgot(){
alert("Reset link feature next step");
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);

/* POSTS */
window.addPost=async()=>{
let t=title.value;
let c=content.value;

if(!t||!c){alert("Fill all");return;}

await addDoc(collection(db,"posts"),{
title:t,
content:c,
status:"Approved",
createdAt:serverTimestamp()
});

title.value="";
content.value="";
loadPosts();
};

async function loadPosts(){
let qs=await getDocs(collection(db,"posts"));
let arr=[];
qs.forEach(d=>{
let x=d.data();
if(x.status==="Approved") arr.push(x);
});

arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

posts.innerHTML="";
arr.forEach(d=>{
posts.innerHTML+=`<div class="post"><b>${d.title}</b><p>${d.content}</p></div>`;
});
}

/* APPROVED */
async function loadApproved(){
let qs=await getDocs(collection(db,"suggestions"));
let arr=[];
qs.forEach(d=>{
let x=d.data();
if(x.status==="Accepted"||x.status==="Approved"){arr.push(x);}
});

approvedBox.innerHTML="";
arr.forEach(d=>{
approvedBox.innerHTML+=`<div class="scroll-item">${d.name}: ${d.suggestion}</div>`;
});

let pos=0;
setInterval(()=>{
pos++;
approvedBox.scrollTop=pos;
if(pos>=approvedBox.scrollHeight-approvedBox.clientHeight){pos=0;}
},50);
}

loadPosts();
loadApproved();
</script>

</body>
</html>
