<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#eef4ff;
}

.header{
  background:#1e88e5;
  color:white;
  text-align:center;
  padding:12px;
}

.container{
  max-width:600px;
  margin:auto;
  padding:10px;
}

.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

textarea{
  width:100%;
  padding:8px;
}

button{
  background:#1e88e5;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  margin-top:5px;
}

.post{
  display:flex;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  background:#90caf9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}
</style>
</head>

<body>

<div class="header">E-Vedhika</div>

<div class="container">

<div class="card">
<textarea id="content" placeholder="Share your problem..."></textarea>
<button onclick="addPost()">Post</button>
</div>

<div id="feed"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let posts=[];
let uid="", username="User", role="user";

auth.onAuthStateChanged(async user=>{
  if(user){
    uid=user.uid;
    username="User"; // simple version
  }
  load();
});

async function load(){
  let snap = await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data(); x.id=d.id;
    posts.push(x);
  });
  render();
}

function render(){
  let html="";

  posts
  .filter(p=>p.status==="Approved" || !p.status)
  .reverse()
  .forEach(p=>{

    html+=`
    <div class="card">

      <div class="post">

        <div class="avatar">
          ${(p.username || "U")[0]}
        </div>

        <div>
          <b>${p.username || "User"}</b><br><br>

          ${p.content || ""}<br><br>

          <button onclick="comment('${p.id}')">💬 Comment</button>
    `;

    if(role==="admin"){
      html+=`<button onclick="approve('${p.id}')">✔ Approve</button>`;
    }

    html+=`</div></div></div>`;
  });

  feed.innerHTML=html;
}

window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    location.href="login.html";
    return;
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    username:username,
    status:"Pending"
  });

  content.value="";
  load();
};

window.comment = (id)=>{
  let text=prompt("Write comment");
  if(!text) return;

  addDoc(collection(db,"posts"),{
    content:text,
    parentId:id,
    username:username,
    status:"Approved"
  });
};

window.approve = async(id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

</script>

</body>
</html>
