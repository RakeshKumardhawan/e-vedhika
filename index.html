<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<style>

/* BACKGROUND */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(120deg,#89f7fe,#66a6ff);
  overflow-x:hidden;
}

/* FLOATING BUBBLES */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.2) 10%,transparent 10%);
  background-size:80px 80px;
  animation:move 20s linear infinite;
}
@keyframes move{
  from{transform:translateY(0);}
  to{transform:translateY(-200px);}
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  color:white;
}

.logo{
  font-size:28px;
  font-weight:bold;
  letter-spacing:1px;
}

.tag{
  font-size:14px;
}

/* GLASS EFFECT */
.glass{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  border-radius:15px;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:220px 1fr 260px;
  gap:15px;
  padding:15px;
}

/* SIDEBAR */
.sidebar{
  padding:10px;
}

.sidebar h4{
  text-align:center;
}

/* SMALL SCROLL */
.scroll-box{
  height:120px;
  overflow:hidden;
  padding:5px;
}

.scroll-item{
  background:rgba(255,255,255,0.6);
  padding:6px;
  margin:5px 0;
  border-radius:8px;
  font-size:12px;
}

/* BUTTON ITEMS */
.side-btn{
  padding:10px;
  margin:8px 0;
  background:rgba(255,255,255,0.4);
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
.side-btn:hover{
  transform:scale(1.05);
  background:white;
}

/* MAIN */
.main{
  padding:15px;
}

/* NEW POST HIGHLIGHT */
.post-box{
  background:linear-gradient(135deg,#ffffff,#e3f2fd);
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  animation:fade 1s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

.post-box input,.post-box textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{
  background:#0077b6;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
button:hover{
  background:#023e8a;
}

/* POSTS */
.post{
  background:rgba(255,255,255,0.7);
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  animation:fade 0.5s;
}

/* RIGHT */
.right{
  padding:10px;
}

.box{
  background:rgba(255,255,255,0.5);
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
}

/* CHATBOT */
.chatbot{
  position:fixed;
  bottom:80px;
  right:20px;
  background:#0077b6;
  color:white;
  padding:12px 18px;
  border-radius:30px;
  cursor:pointer;
}

/* GOOGLE TRANSLATE */
.translate{
  position:fixed;
  bottom:20px;
  left:20px;
  background:white;
  padding:5px;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:800px){
  .container{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">🇮🇳 E-Vedhika</div>
  <div class="tag">All problem solutions at one place</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="sidebar glass">

<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>

<div class="side-btn">📌 Problems</div>
<div class="side-btn">🛠 Fix Errors</div>

</div>

<!-- CENTER -->
<div class="main glass">

<h3>✨ New Post</h3>

<div class="post-box">
<input id="title" placeholder="Title">
<textarea id="content" placeholder="Write something..."></textarea>
<button onclick="addPost()">Post</button>
</div>

<h3>📊 Recent Posts</h3>
<div id="posts"></div>

</div>

<!-- RIGHT -->
<div class="right glass">
<div class="box">🔐 Login / Signup</div>
<div class="box">📢 Union Updates</div>
<div class="box">💬 Chat</div>
</div>

</div>

<!-- CHATBOT -->
<div class="chatbot">🤖 AI Chat</div>

<!-- TRANSLATE -->
<div class="translate">
  <div id="google_translate_element"></div>
</div>

<script>
function googleTranslateElementInit(){
new google.translate.TranslateElement(
{pageLanguage:'en',includedLanguages:'en,te,hi'},
'google_translate_element');
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);

/* POSTS */
window.addPost=async()=>{
let t=title.value;
let c=content.value;

if(t==""||c==""){alert("Fill all");return;}

await addDoc(collection(db,"posts"),{
title:t,content:c,status:"Approved",userType:"public",
createdAt:serverTimestamp()
});

title.value="";content.value="";
loadPosts();
};

async function loadPosts(){
let qs=await getDocs(collection(db,"posts"));
let arr=[];
qs.forEach(d=>{
let x=d.data();
if(x.status==="Approved") arr.push(x);
});
arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

posts.innerHTML="";
arr.forEach(d=>{
posts.innerHTML+=`<div class="post"><h4>${d.title}</h4><p>${d.content}</p></div>`;
});
}

/* APPROVED SCROLL */
async function loadApproved(){
let qs=await getDocs(collection(db,"suggestions"));
let arr=[];
qs.forEach(d=>{
let x=d.data();
if(x.status==="Accepted"||x.status==="Approved") arr.push(x);
});
arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

approvedBox.innerHTML="";
arr.forEach(d=>{
approvedBox.innerHTML+=`<div class="scroll-item">${d.name}: ${d.suggestion}</div>`;
});

let pos=0;
setInterval(()=>{
pos+=1;
approvedBox.scrollTop=pos;
if(pos>=approvedBox.scrollHeight-approvedBox.clientHeight){pos=0;}
},50);
}

loadPosts();
loadApproved();

</script>

</body>
</html>
