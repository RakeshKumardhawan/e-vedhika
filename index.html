<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;font-family:Segoe UI;background:#f0f2f5;}
.header{background:#1877f2;color:white;padding:10px;display:flex;justify-content:space-between;}
.container{max-width:600px;margin:auto;padding:10px;}
.card{background:white;padding:12px;margin-bottom:10px;border-radius:10px;}
textarea,input,select{width:100%;padding:8px;margin-top:5px;}
button{margin-top:5px;padding:6px;border:none;background:#1877f2;color:white;border-radius:5px;}
.comment{background:#eef;padding:5px;margin-top:5px;border-radius:5px;}
</style>
</head>

<body>

<div class="header">
  <b>E-Vedhika</b>
  <button onclick="goLogin()">Login</button>
</div>

<div class="container">

<!-- SEARCH -->
<input id="search" placeholder="Search posts..." onkeyup="searchPosts()">

<!-- CREATE POST -->
<div class="card">
  <textarea id="content" placeholder="Share problem / suggestion..."></textarea>

  <select id="type">
    <option value="problem">Problem</option>
    <option value="suggestion">Suggestion</option>
    <option value="update">Admin Update</option>
  </select>

  <select id="category">
    <option>EPFO</option>
    <option>Aadhar</option>
    <option>Payments</option>
    <option>House Tax</option>
  </select>

  <button onclick="addPost()">Post</button>
</div>

<!-- FEED -->
<div id="feed"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let posts=[];
let uid="", username="", role="user";

// LOGIN OPTIONAL
auth.onAuthStateChanged(async user=>{
  if(user){
    uid=user.uid;

    let u=await getDocs(collection(db,"users"));
    u.forEach(d=>{
      if(d.id===uid){
        username=d.data().username;
        role=d.data().role;
      }
    });
  }
  load();
});

// LOAD POSTS
async function load(){
  let snap=await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data();
    x.id=d.id;
    posts.push(x);
  });
  render(posts);
}

// RENDER FEED
function render(data){
  let html="";

  data
  .filter(p=>!p.parentId && p.status==="Approved")
  .reverse()
  .forEach(p=>{

    html+=`
    <div class="card">
      <b>${p.username} ${p.role==="admin"?"(Admin)":""}</b><br>
      <small>${p.type} | ${p.category}</small><br><br>
      ${p.content}<br><br>
      <button onclick="answer('${p.id}')">Answer</button>
    `;

    if(role==="admin"){
      html+=`
      <button onclick="approve('${p.id}')">Approve</button>
      <button onclick="reject('${p.id}')">Reject</button>
      `;
    }

    // COMMENTS
    posts
    .filter(c=>c.parentId===p.id && c.status==="Approved")
    .forEach(c=>{
      html+=`
      <div class="comment">
        <b>${c.username}</b>: ${c.content}
      </div>
      `;
    });

    html+=`</div>`;
  });

  feed.innerHTML=html;
}

// CREATE POST
window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    return location.href="login.html";
  }

  if(type.value==="update" && role!=="admin"){
    alert("Only admin can post updates");
    return;
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    type:type.value,
    category:category.value,
    parentId:null,
    userId:uid,
    username:username,
    role:role,
    status:"Pending",
    createdAt:new Date()
  });

  content.value="";
  load();
};

// ADD ANSWER
window.answer = async (id)=>{
  let text=prompt("Write solution");
  if(!text) return;

  await addDoc(collection(db,"posts"),{
    content:text,
    type:"solution",
    parentId:id,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  load();
};

// ADMIN
window.approve = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

window.reject = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Rejected"});
  load();
};

// SEARCH
window.searchPosts = ()=>{
  let val=search.value.toLowerCase();
  let filtered = posts.filter(p =>
    p.content.toLowerCase().includes(val) &&
    p.status==="Approved"
  );
  render(filtered);
};

// LOGIN NAV
window.goLogin = ()=>{
  location.href="login.html";
};

</script>

</body>
</html>
