<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(120deg,#74ebd5,#9face6);}
.container{display:grid;grid-template-columns:260px 1fr 320px;gap:15px;padding:15px;height:100vh;}
.glass{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);border-radius:12px;padding:10px;overflow:auto;}

input,textarea{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:8px;
}

button{
background:#0072ff;
color:white;
border:none;
padding:6px;
border-radius:8px;
}

.post{
background:white;
margin:5px 0;
padding:6px;
border-radius:8px;
}

.small-box{
max-height:140px;
overflow:auto;
background:rgba(255,255,255,0.3);
padding:5px;
border-radius:8px;
}

/* 🔥 NEW POST BIG SIZE */
#title{
height:45px;
font-size:16px;
}

#content{
height:120px;
font-size:15px;
}

/* 🔥 UNION BIG BOX */
#unionBox{
max-height:250px;
}

/* 🔥 CHAT थोड़ा bigger (keep balance) */
#chatBox{
max-height:200px;
}
</style>
</head>

<body>

<h2 style="text-align:center;color:white;">🌐 E-Vedhika</h2>

<div class="container">

<!-- LEFT -->
<div class="glass">
<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="small-box"></div>

<h4>📌 Problems</h4>
<textarea id="problemMsg"></textarea>
<button onclick="addProblem()">Post</button>
<div id="problemBox"></div>

<h4>🛠 Fix Errors</h4>
<div id="fixedBox"></div>
</div>

<!-- CENTER -->
<div class="glass">
<h3>New Post</h3>
<input id="title" placeholder="Enter title">
<textarea id="content" placeholder="Write your content..."></textarea>
<button onclick="addPost()">Post</button>
<div id="postBox"></div>
</div>

<!-- RIGHT -->
<div class="glass">

<h3>Login</h3>
<input id="email">
<input id="password" type="password">

<button id="loginBtn" onclick="login()">Login</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>

<p id="userInfo"></p>

<hr>

<h3>Chat</h3>
<div id="chatBox" class="small-box"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>

<hr>

<h3>Union Updates</h3>
<div id="unionBox" class="small-box"></div>

<hr>

<h3>Request to Union</h3>
<textarea id="requestMsg"></textarea>
<button onclick="addRequest()">Send</button>
<div id="requestBox" class="small-box"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);
const auth = getAuth(app);

let currentUser=null;

/* AUTH */
onAuthStateChanged(auth,(user)=>{
currentUser=user;

if(user){
userInfo.innerText="Logged: "+user.email;
loginBtn.style.display="none";
logoutBtn.style.display="inline-block";
chatInput.disabled=false;
}else{
userInfo.innerText="Not logged";
loginBtn.style.display="inline-block";
logoutBtn.style.display="none";
chatInput.disabled=true;
}
});

/* LOGIN */
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

/* POST */
window.addPost=async()=>{
if(!currentUser)return alert("Login required");
await addDoc(collection(db,"posts"),{
title:title.value,
content:content.value
});
};

/* PROBLEM */
window.addProblem=async()=>{
if(!currentUser)return alert("Login required");
await addDoc(collection(db,"problems"),{
msg:problemMsg.value,
user:currentUser.email
});
};

/* CHAT */
window.sendMsg=async()=>{
if(!currentUser)return alert("Login required");
await addDoc(collection(db,"chat"),{
msg:chatInput.value,
user:currentUser.email
});
chatInput.value="";
};

/* REQUEST */
window.addRequest=async()=>{
if(!currentUser)return alert("Login required");
await addDoc(collection(db,"requests"),{
msg:requestMsg.value,
user:currentUser.email
});
requestMsg.value="";
};

/* LOAD */
onSnapshot(collection(db,"posts"),s=>{
postBox.innerHTML="";
s.forEach(d=>postBox.innerHTML+=`<div class="post">${d.data().title||""}</div>`);
});

onSnapshot(collection(db,"problems"),s=>{
problemBox.innerHTML="";
s.forEach(d=>problemBox.innerHTML+=`<div class="post">${d.data().user||"User"}: ${d.data().msg||""}</div>`);
});

onSnapshot(collection(db,"fixed"),s=>{
fixedBox.innerHTML="";
s.forEach(d=>fixedBox.innerHTML+=`<div class="post">${d.data().msg||""}</div>`);
});

onSnapshot(collection(db,"union"),s=>{
unionBox.innerHTML="";
s.forEach(d=>unionBox.innerHTML+=`<div class="post">${d.data().msg||""}</div>`);
});

onSnapshot(collection(db,"chat"),s=>{
chatBox.innerHTML="";
s.forEach(d=>chatBox.innerHTML+=`<div class="post">${d.data().user||"User"}: ${d.data().msg||""}</div>`);
});

onSnapshot(collection(db,"requests"),s=>{
requestBox.innerHTML="";
s.forEach(d=>{
let x=d.data();
requestBox.innerHTML+=`<div class="post">${x.user||""}: ${x.msg||""}</div>`;
});
});

/* APPROVED */
onSnapshot(collection(db,"suggestions"),s=>{
approvedBox.innerHTML="";
s.forEach(d=>{
approvedBox.innerHTML+=`<div class="post">${d.data().user||"User"}: ${d.data().suggestion||""}</div>`;
});

let pos=0;
setInterval(()=>{
pos++;
approvedBox.scrollTop=pos;
if(pos>=approvedBox.scrollHeight-approvedBox.clientHeight) pos=0;
},40);
});

</script>

</body>
</html>
