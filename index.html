<!DOCTYPE html>
<html>
<body>

<h2>🌐 E-Vedhika</h2>

<input id="search" placeholder="Search..."><br><br>

<select onchange="filterCat(this.value)">
<option>All</option>
<option>EPFO</option>
<option>Aadhar</option>
<option>Payments</option>
<option>House Tax</option>
</select>

<hr>

<div id="feed"></div>

<hr>

<h3>Create Post</h3>
<input id="title" placeholder="Title"><br>
<input id="content" placeholder="Content"><br>
<select id="category">
<option>EPFO</option>
<option>Aadhar</option>
<option>Payments</option>
<option>House Tax</option>
</select>
<button onclick="addPost()">Post</button>

<hr>

<h3 id="adminTitle"></h3>
<div id="adminPanel"></div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let posts=[];
let currentUserId="";
let role="user";
let username="";

auth.onAuthStateChanged(async (user)=>{
  if(!user) location.href="login.html";

  currentUserId = user.uid;

  let uSnap = await getDocs(collection(db,"users"));
  uSnap.forEach(d=>{
    if(d.id === currentUserId){
      role = d.data().role;
      username = d.data().username;
    }
  });

  load();
});

async function load(){
  let snap = await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data();
    x.id=d.id;
    posts.push(x);
  });

  renderFeed();
  renderAdmin();
}

function renderFeed(){
  let html="";

  posts.filter(p=>p.status==="Approved" && p.status!=="Deleted")
  .forEach(p=>{

    html+=`
    <div>
    <b>${p.title}</b><br>
    ${p.content}<br>
    Category: ${p.category}<br>
    Posted by ${p.username} ${p.role==="admin"?"(Admin)":""}<br>

    👍 ${p.likes||0}
    <button onclick="like('${p.id}',${p.likes||0})">Like</button>
    `;

    if(p.userId===currentUserId || role==="admin"){
      html+=`
      <button onclick="edit('${p.id}')">Edit</button>
      <button onclick="del('${p.id}')">Delete</button>
      `;
    }

    html+="<hr>";
  });

  feed.innerHTML=html;
}

function renderAdmin(){

  if(role!=="admin") return;

  adminTitle.innerText="Pending Approval";

  let html="";

  posts.filter(p=>p.status==="Pending").forEach(p=>{
    html+=`
    <div>
    ${p.title} by ${p.username}
    <button onclick="approve('${p.id}')">Approve</button>
    <button onclick="reject('${p.id}')">Reject</button>
    </div>
    `;
  });

  adminPanel.innerHTML=html;
}

window.addPost = async ()=>{
  if(!title.value || !content.value) return alert("Fill all");

  await addDoc(collection(db,"posts"),{
    title:title.value,
    content:content.value,
    category:category.value,
    userId:currentUserId,
    username:username,
    role:role,
    likes:0,
    status:"Pending",
    createdAt:new Date()
  });

  load();
};

window.like = async (id,l)=>{
  await updateDoc(doc(db,"posts",id),{likes:l+1});
  load();
};

window.del = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Deleted"});
  load();
};

window.edit = async (id)=>{
  let t=prompt("New title");
  let c=prompt("New content");

  await updateDoc(doc(db,"posts",id),{
    title:t,
    content:c,
    status:"Pending"
  });

  load();
};

window.approve = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

window.reject = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Rejected"});
  load();
};

window.filterCat = (c)=>{
  if(c==="All") renderFeed();
  else feed.innerHTML = posts.filter(p=>p.category===c && p.status==="Approved")
  .map(p=>p.title).join("<br>");
};

search.onkeyup = ()=>{
  let v=search.value.toLowerCase();
  feed.innerHTML = posts.filter(p=>p.title.toLowerCase().includes(v) && p.status==="Approved")
  .map(p=>p.title).join("<br>");
};

</script>

</body>
</html>
