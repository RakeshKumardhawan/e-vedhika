<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(120deg,#74ebd5,#9face6);
  overflow-x:hidden;
}

/* FULL SCREEN */
.container{
  display:grid;
  grid-template-columns:250px 1fr 300px;
  gap:20px;
  padding:20px;
  width:100%;
  height:calc(100vh - 60px);
}

/* HEADER */
h2{
  text-align:center;
  color:white;
  padding:15px;
  margin:0;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:15px;
  box-shadow:0 8px 30px rgba(0,0,0,0.2);
}

/* INPUTS */
input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:8px 12px;
  border:none;
  background:#0072ff;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* POSTS */
.post{
  background:white;
  margin:8px 0;
  padding:10px;
  border-radius:10px;
}

/* SCROLL */
.scroll-box{
  height:120px;
  overflow:hidden;
}

/* BUBBLES */
.bubbles span{
  position:absolute;
  bottom:-50px;
  width:20px;
  height:20px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  animation:rise 15s infinite;
}
@keyframes rise{
  0%{transform:translateY(0);}
  100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<div class="bubbles">
<span style="left:10%"></span>
<span style="left:30%"></span>
<span style="left:60%"></span>
<span style="left:80%"></span>
</div>

<h2>🌐 E-Vedhika</h2>

<div class="container">

<!-- LEFT -->
<div class="glass">
<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>

<h4>📌 Problems</h4>
<button onclick="showProblemPost()">+ Post</button>
<div id="problemForm" style="display:none;">
<input id="ptitle" placeholder="Title">
<textarea id="pcontent"></textarea>
<button onclick="addProblem()">Submit</button>
</div>
<div id="problemsBox"></div>

<h4>🛠 Fix Errors</h4>
<div id="solvedBox"></div>
</div>

<!-- CENTER -->
<div class="glass">
<h3>New Post</h3>
<input id="title" placeholder="Title">
<textarea id="content"></textarea>
<button onclick="addPost()">Post</button>
<div id="posts"></div>
</div>

<!-- RIGHT -->
<div class="glass">
<h3>Login / Signup</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

<p id="userInfo"></p>

<hr>

<h3>Chat</h3>
<div id="chatMessages" style="height:200px;overflow:auto;"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

/* INIT */
const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* EMAIL VALIDATION */
function isValidEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
userInfo.innerText = user ? "Logged: "+user.email : "Not logged";
});

/* LOGIN */
window.login=async()=>{
let e=email.value.trim();
let p=password.value.trim();

if(!isValidEmail(e)) return alert("Enter valid email");
if(p.length<6) return alert("Min 6 chars password");

try{
await signInWithEmailAndPassword(auth,e,p);
alert("Login success");
}catch(err){
alert(err.message);
}
};

/* SIGNUP */
window.signup=async()=>{
let e=email.value.trim();
let p=password.value.trim();

if(!isValidEmail(e)) return alert("Enter valid email");
if(p.length<6) return alert("Min 6 chars password");

try{
await createUserWithEmailAndPassword(auth,e,p);
alert("Signup success");
}catch(err){
alert(err.message);
}
};

/* POSTS */
window.addPost=async()=>{
if(!auth.currentUser) return alert("Login required");

await addDoc(collection(db,"posts"),{
title:title.value,
content:content.value,
createdAt:serverTimestamp()
});
loadPosts();
};

/* PROBLEM */
window.showProblemPost=()=>problemForm.style.display="block";

window.addProblem=async()=>{
await addDoc(collection(db,"problems"),{
title:ptitle.value,
content:pcontent.value,
status:"Pending",
createdAt:serverTimestamp()
});
alert("Submitted");
};

/* CHAT */
window.sendMsg=async()=>{
await addDoc(collection(db,"chat"),{
message:chatInput.value,
createdAt:serverTimestamp()
});
chatInput.value="";
};

function loadChat(){
onSnapshot(collection(db,"chat"),snap=>{
chatMessages.innerHTML="";
snap.forEach(d=>{
chatMessages.innerHTML+=`<div>${d.data().message}</div>`;
});
});
}

/* APPROVED SCROLL */
async function loadApproved(){
let qs=await getDocs(collection(db,"suggestions"));
approvedBox.innerHTML="";
qs.forEach(d=>{
approvedBox.innerHTML+=`<div class="post">${d.data().suggestion}</div>`;
});

let pos=0;
setInterval(()=>{
pos++;
approvedBox.scrollTop=pos;
if(pos>=approvedBox.scrollHeight-approvedBox.clientHeight) pos=0;
},40);
}

/* POSTS LOAD */
async function loadPosts(){
let qs=await getDocs(collection(db,"posts"));
posts.innerHTML="";
qs.forEach(d=>{
let x=d.data();
posts.innerHTML+=`<div class="post">${x.title}<br>${x.content}</div>`;
});
}

/* INIT */
loadPosts();
loadChat();
loadApproved();

</script>

</body>
</html>
