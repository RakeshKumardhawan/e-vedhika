<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(120deg,#74ebd5,#9face6);
  overflow:hidden;
}

/* BUBBLES */
.bubbles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}
.bubbles span{
  position:absolute;
  bottom:-100px;
  width:25px;
  height:25px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  animation:bubble 20s linear infinite;
}
.bubbles span:nth-child(1){left:10%}
.bubbles span:nth-child(2){left:30%}
.bubbles span:nth-child(3){left:50%}
.bubbles span:nth-child(4){left:70%}
.bubbles span:nth-child(5){left:90%}

@keyframes bubble{
  0%{transform:translateY(0)}
  100%{transform:translateY(-110vh)}
}

/* HEADER */
h2{
  text-align:center;
  color:white;
  padding:10px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:250px 1fr 300px;
  gap:20px;
  padding:20px;
  height:calc(100vh - 60px);
  position:relative;
  z-index:2;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:15px;
  box-shadow:0 8px 30px rgba(0,0,0,0.2);
  transition:0.3s;
}
.glass:hover{
  transform:translateY(-5px);
}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  background:#0072ff;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* POSTS */
.post{
  background:white;
  margin:5px 0;
  padding:8px;
  border-radius:10px;
}

/* SCROLL */
.scroll-box{
  height:120px;
  overflow:hidden;
}

/* POPUP */
#signupPopup{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:15px;
  z-index:999;
  width:300px;
}
</style>
</head>

<body>

<div class="bubbles">
<span></span><span></span><span></span><span></span><span></span>
</div>

<h2>🌐 E-Vedhika</h2>

<div class="container">

<!-- LEFT -->
<div class="glass">
<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>

<h4>📌 Problems</h4>
<button onclick="showProblemPost()">+ Post</button>

<div id="problemForm" style="display:none;">
<input id="ptitle" placeholder="Title">
<textarea id="pcontent"></textarea>
<button onclick="addProblem()">Submit</button>
</div>

<div id="problemsBox"></div>

<h4>🛠 Fix Errors</h4>
<div id="solvedBox"></div>
</div>

<!-- CENTER -->
<div class="glass">
<h3>New Post</h3>
<input id="title" placeholder="Title">
<textarea id="content"></textarea>
<button onclick="addPost()">Post</button>
<div id="posts"></div>
</div>

<!-- RIGHT -->
<div class="glass">
<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="openSignup()">Signup</button>

<p id="userInfo"></p>

<hr>

<h3>Chat</h3>
<div id="chatMessages" style="height:200px;overflow:auto;"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<!-- SIGNUP POPUP -->
<div id="signupPopup">
<h3>Signup</h3>
<input id="s_email" placeholder="Email">
<input id="s_password" type="password" placeholder="Password">
<input id="s_confirm" type="password" placeholder="Confirm Password">

<button onclick="signup()">Create</button>
<button onclick="closeSignup()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
userInfo.innerText = user ? "Logged: "+user.email : "Not logged";
});

/* LOGIN */
window.login = async ()=>{
let e=email.value.trim();
let p=password.value.trim();

if(!e || !p){
alert("Enter email & password");
return;
}

try{
await signInWithEmailAndPassword(auth,e,p);
alert("Login success");
}catch{
alert("Invalid login");
}
};

/* SIGNUP POPUP */
window.openSignup=()=>signupPopup.style.display="block";
window.closeSignup=()=>signupPopup.style.display="none";

/* SIGNUP */
window.signup = async ()=>{
let e=s_email.value.trim();
let p=s_password.value.trim();
let c=s_confirm.value.trim();

if(!e||!p||!c){alert("Fill all");return;}
if(p!==c){alert("Password mismatch");return;}

try{
await createUserWithEmailAndPassword(auth,e,p);
alert("Signup success");
closeSignup();
}catch(err){
alert(err.message);
}
};

/* POSTS */
window.addPost=async()=>{
if(!auth.currentUser){alert("Login required");return;}

await addDoc(collection(db,"posts"),{
title:title.value,
content:content.value,
createdAt:serverTimestamp()
});
};

/* PROBLEM */
window.showProblemPost=()=>problemForm.style.display="block";

window.addProblem=async()=>{
await addDoc(collection(db,"problems"),{
title:ptitle.value,
content:pcontent.value,
status:"Pending",
createdAt:serverTimestamp()
});
};

/* CHAT */
window.sendMsg=async()=>{
await addDoc(collection(db,"chat"),{
message:chatInput.value,
createdAt:serverTimestamp()
});
chatInput.value="";
};

function loadChat(){
onSnapshot(collection(db,"chat"),snap=>{
chatMessages.innerHTML="";
snap.forEach(d=>{
chatMessages.innerHTML+=`<div>${d.data().message}</div>`;
});
});
}

/* APPROVED SCROLL */
async function loadApproved(){
let qs=await getDocs(collection(db,"suggestions"));
approvedBox.innerHTML="";
qs.forEach(d=>{
approvedBox.innerHTML+=`<div class="post">${d.data().suggestion}</div>`;
});

let pos=0;
setInterval(()=>{
pos++;
approvedBox.scrollTop=pos;
if(pos>=approvedBox.scrollHeight-approvedBox.clientHeight) pos=0;
},40);
}

loadChat();
loadApproved();

</script>

</body>
</html>
