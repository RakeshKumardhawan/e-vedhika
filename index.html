<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI';background:linear-gradient(120deg,#74ebd5,#9face6);overflow:hidden;}

.bubbles{position:fixed;width:100%;height:100%;z-index:0;}
.bubbles span{position:absolute;bottom:-100px;width:25px;height:25px;background:rgba(255,255,255,0.3);border-radius:50%;animation:bubble 20s linear infinite;}
.bubbles span:nth-child(1){left:10%}.bubbles span:nth-child(2){left:30%}.bubbles span:nth-child(3){left:50%}.bubbles span:nth-child(4){left:70%}.bubbles span:nth-child(5){left:90%}
@keyframes bubble{0%{transform:translateY(0)}100%{transform:translateY(-110vh)}}

.container{display:grid;grid-template-columns:250px 1fr 320px;gap:20px;padding:20px;height:calc(100vh - 60px);position:relative;z-index:2;}

.glass{background:rgba(255,255,255,0.2);backdrop-filter:blur(20px);border-radius:20px;padding:15px;}
input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none;}
button{padding:8px 12px;border:none;background:#0072ff;color:white;border-radius:10px;cursor:pointer;}
.post{background:white;margin:5px 0;padding:8px;border-radius:10px;}
.scroll-box{height:120px;overflow:hidden;}
.small-box{max-height:120px;overflow:auto;background:rgba(255,255,255,0.3);padding:5px;border-radius:10px;}

#signupPopup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:15px;z-index:999;width:300px;}
</style>
</head>

<body>

<div class="bubbles">
<span></span><span></span><span></span><span></span><span></span>
</div>

<h2 style="text-align:center;color:white;">🌐 E-Vedhika</h2>

<div class="container">

<div class="glass">
<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>
</div>

<div class="glass">
<h3>New Post</h3>
<input id="title">
<textarea id="content"></textarea>
<button onclick="addPost()">Post</button>
</div>

<div class="glass">

<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password">

<button onclick="login()">Login</button>
<button onclick="openSignup()">Signup</button>
<button onclick="logout()">Logout</button>

<p id="userInfo"></p>

<hr>

<h3>Chat</h3>
<div id="chatMessages" style="height:120px;overflow:auto;"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>

<hr>

<h3>Union Updates</h3>
<div id="unionBox" class="small-box"></div>
<textarea id="unionMsg"></textarea>
<button onclick="addUnion()">Post Update</button>

<hr>

<h3>Request to Union</h3>
<div id="requestBox" class="small-box"></div>
<textarea id="requestMsg"></textarea>
<button onclick="addRequest()">Send Request</button>

</div>

</div>

<div id="signupPopup">
<h3>Signup</h3>
<input id="s_email">
<input id="s_password" type="password">
<input id="s_confirm" type="password">
<button onclick="signup()">Create</button>
<button onclick="closeSignup()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged
