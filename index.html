<!-- ONLY IMPORTANT CHANGES SHOWING BELOW (ADD THIS INTO YOUR EXISTING FINAL CODE) -->

<script type="module">

// 🔥 ADMIN EMAIL
const ADMIN_EMAIL = "youradmin@gmail.com";

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{

  if(user){
    userInfo.innerText="Logged: "+user.email;
    loginBtn.style.display="none";
    signupBtn.style.display="none";
    logoutBtn.style.display="inline-block";

    // 🔥 DEFAULT BLOCK EVERYTHING
    chatInput.disabled = true;
    unionMsg.disabled = true;
    requestMsg.disabled = true;
    title.disabled = true;
    content.disabled = true;

    // 🔥 ADMIN FULL ACCESS
    if(user.email === ADMIN_EMAIL){
      chatInput.disabled = false;
      unionMsg.disabled = false;
      requestMsg.disabled = false;
      title.disabled = false;
      content.disabled = false;
    }

  }else{
    userInfo.innerText="Not logged";
    loginBtn.style.display="inline-block";
    signupBtn.style.display="inline-block";
    logoutBtn.style.display="none";

    // 🔥 BLOCK ALL
    chatInput.disabled = true;
    unionMsg.disabled = true;
    requestMsg.disabled = true;
    title.disabled = true;
    content.disabled = true;
  }

});

/* 🔥 UNION (ADMIN ONLY) */
window.addUnion=async()=>{
const user=auth.currentUser;
if(!user || user.email !== ADMIN_EMAIL){
  alert("Only admin allowed");
  return;
}

await addDoc(collection(db,"union"),{
message:unionMsg.value,
user:user.email,
createdAt:serverTimestamp()
});
unionMsg.value="";
};

/* 🔥 CHAT BLOCK */
window.sendMsg=async()=>{
const user=auth.currentUser;
if(!user || user.email !== ADMIN_EMAIL){
  alert("Not allowed");
  return;
}

await addDoc(collection(db,"chat"),{
message:chatInput.value,
createdAt:serverTimestamp()
});
};

/* 🔥 REQUEST BLOCK */
window.addRequest=async()=>{
const user=auth.currentUser;
if(!user || user.email !== ADMIN_EMAIL){
  alert("Not allowed");
  return;
}

await addDoc(collection(db,"requests"),{
message:requestMsg.value,
user:user.email,
createdAt:serverTimestamp()
});
};

/* 🔥 NEW POST BLOCK */
window.addPost=async()=>{
const user=auth.currentUser;
if(!user || user.email !== ADMIN_EMAIL){
  alert("Only admin can post");
  return;
}

await addDoc(collection(db,"posts"),{
title:title.value,
content:content.value,
createdAt:serverTimestamp()
});
};

</script>
