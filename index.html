<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(#89f7fe,#66a6ff);}
.container{display:grid;grid-template-columns:220px 1fr 280px;gap:10px;padding:10px;}
.glass{background:rgba(255,255,255,0.3);padding:10px;border-radius:10px;}
.post{background:white;margin:5px;padding:8px;border-radius:8px;}
.scroll-box{height:120px;overflow:hidden;}
</style>
</head>

<body>

<h2 style="text-align:center;color:white;">🌐 E-Vedhika</h2>

<div class="container">

<!-- LEFT -->
<div class="glass">
<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>

<h4>📌 Problems</h4>
<div id="problemsBox"></div>

<h4>🛠 Fix Errors</h4>
<div id="solvedBox"></div>
</div>

<!-- CENTER -->
<div class="glass">
<h3>New Post</h3>
<input id="title" placeholder="Title">
<textarea id="content" placeholder="Write"></textarea>
<button onclick="addPost()">Post</button>
<div id="posts"></div>
</div>

<!-- RIGHT -->
<div class="glass">
<h3>Login</h3>
<input id="email">
<input id="password" type="password">
<button onclick="login()">Login</button>

<hr>

<h3>Chat</h3>
<div id="chatMessages" style="height:200px;overflow:auto;"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script type="module">

/* 🔥 SINGLE IMPORT (NO DUPLICATES) */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, serverTimestamp, onSnapshot 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { 
  getAuth, signInWithEmailAndPassword, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

/* INIT */
const app = initializeApp({
  apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
  authDomain:"e-vedhika-258f2.firebaseapp.com",
  projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* ROLE SYSTEM */
let USER_ROLE="user";

onAuthStateChanged(auth, async(user)=>{
  if(user){
    let qs = await getDocs(collection(db,"users"));
    qs.forEach(d=>{
      let x=d.data();
      if(x.email===user.email){
        USER_ROLE=x.role;
      }
    });
  }
});

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    alert("Login success");
  }catch{
    alert("Login failed");
  }
};

/* POSTS */
window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    return;
  }

  await addDoc(collection(db,"posts"),{
    title:title.value,
    content:content.value,
    status:"Approved",
    createdAt:serverTimestamp()
  });

  title.value="";
  content.value="";
  loadPosts();
};

async function loadPosts(){
  let qs=await getDocs(collection(db,"posts"));
  let arr=[];
  qs.forEach(d=>{
    let x=d.data();
    if(x.status==="Approved") arr.push(x);
  });

  arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  posts.innerHTML="";
  arr.forEach(d=>{
    posts.innerHTML+=`<div class="post">${d.title}<br>${d.content}</div>`;
  });
}

/* 🔥 APPROVED SUGGESTIONS + AUTO SCROLL */
async function loadApproved(){

  let qs=await getDocs(collection(db,"suggestions"));
  let arr=[];

  qs.forEach(d=>{
    let x=d.data();
    if(x.status==="Accepted"||x.status==="Approved"){
      arr.push(x);
    }
  });

  approvedBox.innerHTML="";
  arr.forEach(d=>{
    approvedBox.innerHTML+=`<div class="post">${d.suggestion}</div>`;
  });

  let pos=0;
  setInterval(()=>{
    pos++;
    approvedBox.scrollTop=pos;

    if(pos>=approvedBox.scrollHeight-approvedBox.clientHeight){
      pos=0;
    }
  },40);
}

/* PROBLEMS (NO ADMIN BUTTONS) */
async function loadProblems(){

  let qs=await getDocs(collection(db,"problems"));
  let arr=[];
  qs.forEach(d=>arr.push({id:d.id,...d.data()}));

  arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  problemsBox.innerHTML="";
  solvedBox.innerHTML="";

  for(let d of arr){

    let html=`
    <div class="post">
      <b>${d.title}</b><br>
      ${d.content}<br>

      <input id="r_${d.id}">
      <button onclick="addReply('${d.id}')">Reply</button>

      <div id="rep_${d.id}"></div>
    </div>`;

    if(d.status==="Solved"){
      solvedBox.innerHTML+=html;
    }else{
      problemsBox.innerHTML+=html;
    }

    let rqs=await getDocs(collection(db,"problems",d.id,"replies"));
    rqs.forEach(r=>{
      document.getElementById("rep_"+d.id).innerHTML+=`<div>${r.data().message}</div>`;
    });
  }
}

/* REPLY */
window.addReply = async(id)=>{
  let msg=document.getElementById("r_"+id).value;

  if(!msg){
    alert("Enter reply");
    return;
  }

  await addDoc(collection(db,"problems",id,"replies"),{
    message:msg,
    createdAt:serverTimestamp()
  });

  loadProblems();
};

/* CHAT */
window.sendMsg = async ()=>{
  let msg=chatInput.value;

  if(!msg){
    alert("Enter message");
    return;
  }

  await addDoc(collection(db,"chat"),{
    message:msg,
    createdAt:serverTimestamp()
  });

  chatInput.value="";
};

function loadChat(){
  onSnapshot(collection(db,"chat"),(snap)=>{
    let arr=[];
    snap.forEach(d=>arr.push(d.data()));

    arr.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));

    chatMessages.innerHTML="";
    arr.forEach(d=>{
      chatMessages.innerHTML+=`<div>${d.message}</div>`;
    });

    chatMessages.scrollTop=chatMessages.scrollHeight;
  });
}

/* INIT */
loadPosts();
loadApproved();
loadProblems();
loadChat();

</script>

</body>
</html>
