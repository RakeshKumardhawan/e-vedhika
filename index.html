<!DOCTYPE html>
<html>
<body>

<h2>E-Vedhika</h2>

<button onclick="location.href='profile.html'">Profile</button>
<button onclick="location.href='admin.html'">Admin</button>

<textarea id="content"></textarea>
<input type="file" id="img">
<button onclick="addPost()">Post</button>

<hr>
<div id="feed"></div>

<script type="module">

import { auth, db, storage } from "./firebase.js";
import {
collection, addDoc, getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import {
ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

let posts=[], user="User";

async function load(){
  let snap=await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data(); x.id=d.id;
    posts.push(x);
  });

  let html="";
  posts.filter(p=>p.status==="Approved")
  .forEach(p=>{
    html+=`
    <div>
      <b>${p.username}</b><br>
      ${p.content}<br>
      ${p.image ? `<img src="${p.image}" width="200">`:""}
    </div><hr>`;
  });

  feed.innerHTML=html;
}

window.addPost = async ()=>{
  let imgUrl="";

  if(img.files[0]){
    let r=ref(storage,"posts/"+Date.now());
    await uploadBytes(r,img.files[0]);
    imgUrl=await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    image:imgUrl,
    username:user,
    status:"Pending"
  });

  load();
};

load();

</script>
</body>
</html>
