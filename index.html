<!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

/* HEADER */
.header{
  background:#1877f2;
  color:white;
  padding:12px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

/* POST BOX */
.post-box{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.post-box input, .post-box textarea, .post-box select{
  width:100%;
  margin:5px 0;
  padding:8px;
}

/* POST CARD */
.card{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.post-header{
  font-weight:bold;
}

.post-content{
  margin:10px 0;
}

.actions button{
  border:none;
  background:#e4e6eb;
  padding:5px 10px;
  margin:3px;
  border-radius:5px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
E-Vedhika
</div>

<div class="container">

<!-- CREATE POST -->
<div class="post-box">
  <textarea id="content" placeholder="What's your problem..."></textarea>

  <select id="category">
    <option>EPFO</option>
    <option>Aadhar</option>
    <option>Payments</option>
    <option>House Tax</option>
  </select>

  <button onclick="addPost()">Post</button>
</div>

<!-- FEED -->
<div id="feed"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let posts=[];
let uid="";
let role="user";
let username="";

auth.onAuthStateChanged(async (user)=>{
  if(user){
    uid = user.uid;

    let snap = await getDocs(collection(db,"users"));
    snap.forEach(d=>{
      if(d.id===uid){
        role=d.data().role;
        username=d.data().username;
      }
    });
  }

  load();
});

async function load(){
  let snap = await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data();
    x.id=d.id;
    posts.push(x);
  });

  render();
}

function render(){
  let html="";

  posts
  .filter(p=>p.status==="Approved" && p.status!=="Deleted")
  .reverse()
  .forEach(p=>{

    html+=`
    <div class="card">

      <div class="post-header">
        ${p.username} ${p.role==="admin"?"(Admin)":""}
      </div>

      <div style="font-size:12px;color:gray;">
        ${p.category}
      </div>

      <div class="post-content">
        ${p.content}
      </div>

      <div class="actions">
        👍 ${p.likes||0}
        <button onclick="like('${p.id}',${p.likes||0})">Like</button>
    `;

    if(auth.currentUser && (p.userId===uid || role==="admin")){
      html+=`
        <button onclick="edit('${p.id}')">Edit</button>
        <button onclick="del('${p.id}')">Delete</button>
      `;
    }

    html+=`
      </div>
    </div>
    `;
  });

  feed.innerHTML=html;
}

window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    location.href="login.html";
    return;
  }

  if(!content.value){
    alert("Write something");
    return;
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    category:category.value,
    userId:uid,
    username:username,
    role:role,
    likes:0,
    status:"Pending",
    createdAt:new Date()
  });

  content.value="";
  load();
};

window.like = async (id,l)=>{
  if(!auth.currentUser){
    alert("Login required");
    return;
  }

  await updateDoc(doc(db,"posts",id),{likes:l+1});
  load();
};

window.del = async (id)=>{
  if(!confirm("Delete post?")) return;

  await updateDoc(doc(db,"posts",id),{status:"Deleted"});
  load();
};

window.edit = async (id)=>{
  let c=prompt("Edit content");

  if(!c) return;

  await updateDoc(doc(db,"posts",id),{
    content:c,
    status:"Pending"
  });

  load();
};

</script>

</body>
</html>
