<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(180deg,#eef4ff,#ffffff);
}

/* HEADER */
.header{
  background:linear-gradient(90deg,#1e88e5,#42a5f5);
  color:white;
  padding:15px;
  text-align:center;
}

/* SEARCH */
.search{
  padding:10px;
  text-align:center;
}
.search input{
  width:90%;
  padding:10px;
  border-radius:25px;
  border:none;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* GRID */
.main{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:12px;
  padding:12px;
}
@media(max-width:768px){
  .main{grid-template-columns:1fr;}
}

/* CARD */
.card{
  background:white;
  border-radius:15px;
  padding:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* BUTTON */
button{
  background:#1e88e5;
  color:white;
  border:none;
  padding:7px 12px;
  border-radius:8px;
  margin-top:5px;
}

/* POST */
.post{
  display:flex;
  gap:10px;
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#90caf9;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
}

.meta{font-size:12px;color:gray;}

.comment{
  background:#eef;
  padding:6px;
  border-radius:8px;
  margin-top:5px;
}

img{
  width:100%;
  border-radius:10px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <h2>E-Vedhika</h2>
  <div>All solutions at one place</div>
</div>

<div class="search">
  <input id="search" placeholder="Search..." onkeyup="searchPosts()">
</div>

<div class="main">

<!-- LEFT -->
<div>
  <div class="card">✔ Approved Suggestions</div>
  <div class="card">📌 Post Problems</div>
  <div class="card">📘 Fix Errors</div>
</div>

<!-- CENTER -->
<div>

<div class="card">
  <textarea id="content" placeholder="Write your issue..." style="width:100%"></textarea>

  <input type="file" id="img">

  <select id="type">
    <option value="problem">Problem</option>
    <option value="suggestion">Suggestion</option>
    <option value="update">Update</option>
  </select>

  <button onclick="addPost()">Post</button>
</div>

<div id="feed"></div>

</div>

<!-- RIGHT -->
<div>
  <div class="card">
    <h3>Welcome</h3>
    <button onclick="goLogin()">Login</button>
  </div>

  <div class="card">📢 Union Updates</div>
  <div class="card">💬 Discuss</div>
</div>

</div>

<script type="module">

import { auth, db, storage } from "./firebase.js";

import {
collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import {
ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

let posts=[];
let uid="", username="", role="user";

auth.onAuthStateChanged(async user=>{
  if(user){
    uid=user.uid;

    let u=await getDocs(collection(db,"users"));
    u.forEach(d=>{
      if(d.id===uid){
        username=d.data().username;
        role=d.data().role;
      }
    });
  }
  load();
});

// LOAD POSTS
async function load(){
  let snap=await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data();
    x.id=d.id;
    posts.push(x);
  });
  render(posts);
}

// RENDER
function render(data){
  let html="";

  data.filter(p=>!p.parentId && p.status==="Approved")
  .reverse()
  .forEach(p=>{

    html+=`
    <div class="card">

    <div class="post">
      <div class="avatar">${(p.username||"U")[0]}</div>

      <div>
        <b>${p.username || "User"}</b><br>
        <span class="meta">${p.type || ""}</span><br>

        ${p.content || ""}

        ${p.image ? `<img src="${p.image}">` : ""}

        <br>

        <button onclick="showCommentBox('${p.id}')">💬 Comment</button>
    `;

    if(role==="admin"){
      html+=`<button onclick="approve('${p.id}')">✔ Approve</button>`;
    }

    html+=`
    <div id="cbox-${p.id}" style="display:none">
      <input id="c-${p.id}" placeholder="Write comment">
      <button onclick="addComment('${p.id}')">Send</button>
    </div>
    `;

    posts.filter(c=>c.parentId===p.id && c.status==="Approved")
    .forEach(c=>{
      html+=`
      <div class="comment">
        <b>${c.username}</b>: ${c.content}
      </div>`;
    });

    html+=`</div></div></div>`;
  });

  feed.innerHTML=html;
}

// ADD POST
window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    location.href="login.html";
    return;
  }

  let imgUrl="";

  if(img.files[0]){
    let r = ref(storage,"posts/"+Date.now());
    await uploadBytes(r,img.files[0]);
    imgUrl = await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    type:type.value,
    image:imgUrl,
    parentId:null,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  content.value="";
  load();
};

// COMMENT BOX
window.showCommentBox = (id)=>{
  document.getElementById("cbox-"+id).style.display="block";
};

// ADD COMMENT
window.addComment = async (id)=>{
  let text=document.getElementById("c-"+id).value;
  if(!text) return;

  await addDoc(collection(db,"posts"),{
    content:text,
    parentId:id,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  load();
};

// ADMIN APPROVE
window.approve = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

// SEARCH
window.searchPosts = ()=>{
  let val=search.value.toLowerCase();
  render(posts.filter(p=>p.content?.toLowerCase().includes(val)));
};

// LOGIN
window.goLogin = ()=>{
  location.href="login.html";
};

</script>

</body>
</html>
