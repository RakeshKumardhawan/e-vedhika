<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#89f7fe,#66a6ff);
}

.container{
  display:grid;
  grid-template-columns:220px 1fr 280px;
  gap:15px;
  padding:15px;
}

.glass{
  background:rgba(255,255,255,0.3);
  backdrop-filter: blur(15px);
  border-radius:15px;
  padding:15px;
}

.post{
  background:white;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.scroll-box{
  height:120px;
  overflow:hidden;
}
</style>
</head>

<body>

<h2 style="text-align:center;color:white;">🌐 E-Vedhika</h2>

<div class="container">

<!-- LEFT -->
<div class="glass">
<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>

<h4>📌 Problems</h4>
<div id="problemsBox"></div>

<h4>🛠 Fix Errors</h4>
<div id="solvedBox"></div>
</div>

<!-- CENTER -->
<div class="glass">

<h3>New Post</h3>

<input id="title" placeholder="Title">
<textarea id="content" placeholder="Write"></textarea>
<button onclick="addPost()">Post</button>

<div id="posts"></div>

</div>

<!-- RIGHT -->
<div class="glass">

<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h3>Chat</h3>
<div id="chatMessages" style="height:200px;overflow:auto;"></div>
<input id="chatInput" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, updateDoc, doc, serverTimestamp, onSnapshot 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
  authDomain:"e-vedhika-258f2.firebaseapp.com",
  projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* POSTS */
window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    return;
  }

  await addDoc(collection(db,"posts"),{
    title:title.value,
    content:content.value,
    status:"Approved",
    createdAt:serverTimestamp()
  });

  title.value="";
  content.value="";
  loadPosts();
};

async function loadPosts(){
  let qs=await getDocs(collection(db,"posts"));
  let arr=[];
  qs.forEach(d=>{
    let x=d.data();
    if(x.status==="Approved") arr.push(x);
  });

  arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  posts.innerHTML="";
  arr.forEach(d=>{
    posts.innerHTML+=`<div class="post"><b>${d.title}</b><p>${d.content}</p></div>`;
  });
}

/* APPROVED */
async function loadApproved(){
  let qs=await getDocs(collection(db,"suggestions"));
  let arr=[];

  qs.forEach(d=>{
    let x=d.data();
    if(x.status==="Accepted"||x.status==="Approved") arr.push(x);
  });

  approvedBox.innerHTML="";
  arr.forEach(d=>{
    approvedBox.innerHTML+=`<div class="post">${d.name}: ${d.suggestion}</div>`;
  });

  let pos=0;
  setInterval(()=>{
    pos++;
    approvedBox.scrollTop=pos;
    if(pos>=approvedBox.scrollHeight-approvedBox.clientHeight) pos=0;
  },50);
}

/* PROBLEMS */
async function loadProblems(){
  let qs=await getDocs(collection(db,"problems"));
  let arr=[];
  qs.forEach(d=>arr.push({id:d.id,...d.data()}));

  arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  problemsBox.innerHTML="";
  solvedBox.innerHTML="";

  for(let d of arr){

    let html=`
    <div class="post">
    <b>${d.title}</b><br>${d.content}<br>
    <input id="r_${d.id}">
    <button onclick="addReply('${d.id}')">Reply</button>
    <button onclick="markSolved('${d.id}')">Solved</button>
    <div id="rep_${d.id}"></div>
    </div>`;

    if(d.status==="Solved") solvedBox.innerHTML+=html;
    else problemsBox.innerHTML+=html;

    let rqs=await getDocs(collection(db,"problems",d.id,"replies"));
    rqs.forEach(r=>{
      let x=r.data();
      document.getElementById("rep_"+d.id).innerHTML+=`<div>${x.message}</div>`;
    });
  }
}

window.addReply = async(id)=>{
  let msg=document.getElementById("r_"+id).value;
  if(!msg) return;

  await addDoc(collection(db,"problems",id,"replies"),{
    message:msg,
    createdAt:serverTimestamp()
  });

  loadProblems();
};

window.markSolved = async(id)=>{
  await updateDoc(doc(db,"problems",id),{status:"Solved"});
  loadProblems();
};

/* CHAT (FIXED) */
window.sendMsg = async ()=>{
  let input = document.getElementById("chatInput");
  let msg = input.value;

  if(!msg){
    alert("Enter message");
    return;
  }

  await addDoc(collection(db,"chat"),{
    message:msg,
    createdAt:serverTimestamp()
  });

  input.value="";
};

function loadChat(){
  const chatBox = document.getElementById("chatMessages");

  onSnapshot(collection(db,"chat"),(snapshot)=>{

    let arr=[];
    snapshot.forEach(doc=>{
      arr.push(doc.data());
    });

    arr.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));

    chatBox.innerHTML="";

    arr.forEach(d=>{
      chatBox.innerHTML+=`
      <div style="background:#eee;padding:5px;margin:5px;border-radius:5px;">
      ${d.message}
      </div>`;
    });

    chatBox.scrollTop=chatBox.scrollHeight;

  });
}

/* LOGIN (basic placeholder) */
window.login=()=>alert("Use Firebase Auth");

/* INIT */
loadPosts();
loadApproved();
loadProblems();
loadChat();

</script>

</body>
</html>
