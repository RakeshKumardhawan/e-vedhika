<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.header{background:#2196f3;color:white;padding:10px;text-align:center}
.container{max-width:600px;margin:auto;padding:10px}
.card{background:white;padding:10px;margin-bottom:10px;border-radius:10px}
textarea{width:100%;padding:8px}
button{padding:6px;margin-top:5px;background:#2196f3;color:white;border:none}
</style>
</head>

<body>

<div class="header">E-Vedhika</div>

<div class="container">

<div class="card">
<textarea id="content" placeholder="Write your problem..."></textarea>
<button onclick="addPost()">Post</button>
</div>

<div id="feed"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let posts=[];

async function load(){
  let snap=await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data(); x.id=d.id;
    posts.push(x);
  });

  let html="";
  posts.forEach(p=>{
    html+=`<div class="card">${p.content || ""}</div>`;
  });

  feed.innerHTML=html;
}

window.addPost = async ()=>{
  if(!content.value) return;

  await addDoc(collection(db,"posts"),{
    content:content.value
  });

  content.value="";
  load();
};

load();

</script>

</body>
</html>
