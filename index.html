<!-- 🔥 CENTER POSTS SECTION -->
<div class="main">
  <h3>📝 New Post</h3>

  <div class="post-box">
    <input type="text" id="title" placeholder="Title" style="width:100%;padding:8px;"><br><br>
    <textarea id="content" placeholder="Write something..." style="width:100%;height:80px;"></textarea><br><br>

    <button onclick="addPost()">Post</button>
  </div>

  <h3>📊 Recent Posts</h3>
  <div id="posts"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
  authDomain:"e-vedhika-258f2.firebaseapp.com",
  projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);

let postsBox = document.getElementById("posts");

/* 🔥 ADD POST */
window.addPost = async function(){

  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;

  if(title=="" || content==""){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db,"posts"),{
    title,
    content,
    userType:"public", // admin / public
    status:"Approved",
    createdAt: serverTimestamp()
  });

  alert("Post Added");

  document.getElementById("title").value="";
  document.getElementById("content").value="";

  loadPosts();
};

/* 🔥 LOAD POSTS */
async function loadPosts(){

  let qs = await getDocs(collection(db,"posts"));
  let arr=[];

  qs.forEach(d=>{
    let x=d.data();

    if(x.status==="Approved"){
      arr.push(x);
    }
  });

  // latest first
  arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  displayPosts(arr);
}

/* 🔥 DISPLAY */
function displayPosts(arr){
  postsBox.innerHTML="";

  arr.forEach(d=>{
    postsBox.innerHTML+=`
      <div style="background:white;margin:10px;padding:15px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);text-align:left;">
        <h4>${d.title}</h4>
        <p>${d.content}</p>
      </div>
    `;
  });
}

loadPosts();

</script>
