<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(120deg,#74ebd5,#9face6);
  overflow:hidden;
}

/* BUBBLES */
.bubbles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}
.bubbles span{
  position:absolute;
  bottom:-100px;
  width:25px;
  height:25px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  animation:bubble 20s linear infinite;
}
.bubbles span:nth-child(1){left:10%}
.bubbles span:nth-child(2){left:30%}
.bubbles span:nth-child(3){left:60%}
.bubbles span:nth-child(4){left:80%}

@keyframes bubble{
  0%{transform:translateY(0)}
  100%{transform:translateY(-110vh)}
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:250px 1fr 300px;
  gap:20px;
  padding:20px;
  height:calc(100vh - 60px);
  position:relative;
  z-index:2;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(25px);
  border-radius:20px;
  padding:15px;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:8px;
  background:#0072ff;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.post{
  background:white;
  margin:5px 0;
  padding:8px;
  border-radius:10px;
}

.scroll-box{
  height:120px;
  overflow:hidden;
}
</style>
</head>

<body>

<div class="bubbles">
<span></span><span></span><span></span><span></span>
</div>

<h2 style="text-align:center;color:white;">🌐 E-Vedhika</h2>

<div class="container">

<div class="glass">
<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>
</div>

<div class="glass">
<h3>New Post</h3>
<input id="title">
<textarea id="content"></textarea>
<button onclick="addPost()">Post</button>
</div>

<div class="glass">
<h3>Login / Signup</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

<p id="status"></p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const auth = getAuth(app);

/* LOGIN */
window.login = async ()=>{
let e=document.getElementById("email").value.trim();
let p=document.getElementById("password").value.trim();

if(!e || !p){
alert("Enter email & password");
return;
}

try{
await signInWithEmailAndPassword(auth,e,p);
status.innerText="Login success";
}catch(err){
alert(err.message);
}
};

/* SIGNUP */
window.signup = async ()=>{
let e=document.getElementById("email").value.trim();
let p=document.getElementById("password").value.trim();

if(!e || !p){
alert("Enter email & password");
return;
}

try{
await createUserWithEmailAndPassword(auth,e,p);
status.innerText="Signup success";
}catch(err){
alert(err.message);
}
};

</script>

</body>
</html>
