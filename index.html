<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#f5f7fa;
}

/* HEADER */
.header{
  text-align:center;
  background:#e3f2fd;
  padding:10px;
}
.header h2{margin:0;color:#0d47a1;}
.tagline{font-size:13px;color:#555;}
.searchbar input{
  width:80%;
  padding:8px;
  margin-top:5px;
}

/* MAIN GRID */
.main{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:10px;
  padding:10px;
}

/* BOX */
.box{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

/* FEED */
.feed{
  background:white;
  padding:10px;
  border-radius:10px;
}

/* POST */
.post{
  border-bottom:1px solid #eee;
  padding:10px 0;
}
.meta{font-size:12px;color:gray;}
.comment{
  background:#eef;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}

/* FOOTER */
.footer{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

button{
  padding:6px;
  margin-top:5px;
  border:none;
  background:#2196f3;
  color:white;
}

textarea{
  width:100%;
  padding:8px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>E-Vedhika</h2>
  <div class="tagline">All solutions at one place</div>
  <div class="searchbar">
    <input id="search" placeholder="Search..." onkeyup="searchPosts()">
  </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- LEFT -->
<div>
  <div class="box">✔ Approved Suggestions</div>
  <div class="box">📌 Post Problems & Suggestions</div>
  <div class="box">📘 How to Fix Errors</div>
</div>

<!-- CENTER -->
<div class="feed">

<div class="box">
  <textarea id="content" placeholder="Write your issue..."></textarea>

  <select id="type">
    <option value="problem">Problem</option>
    <option value="suggestion">Suggestion</option>
    <option value="update">Admin Update</option>
  </select>

  <button onclick="addPost()">Post</button>
</div>

<div id="feed"></div>

</div>

<!-- RIGHT -->
<div>
  <div class="box">
    👤 Login / Signup<br>
    <button onclick="goLogin()">Open</button>
  </div>
  <div class="box">⚠ Union Issues</div>
  <div class="box">💬 Comments & Discuss</div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div class="box">🌐 Website Translation (Indian Languages)</div>
  <div class="box">🤖 AI Chatbot</div>
</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let posts=[];
let uid="", username="", role="user";

auth.onAuthStateChanged(async user=>{
  if(user){
    uid=user.uid;

    let u=await getDocs(collection(db,"users"));
    u.forEach(d=>{
      if(d.id===uid){
        username=d.data().username;
        role=d.data().role;
      }
    });
  }
  load();
});

async function load(){
  let snap=await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data();
    x.id=d.id;
    posts.push(x);
  });
  render(posts);
}

function render(data){
  let html="";

  data
  .filter(p=>!p.parentId && p.status==="Approved")
  .reverse()
  .forEach(p=>{

    html+=`
    <div class="post">
      <b>${p.username} ${p.role==="admin"?"(Admin)":""}</b><br>
      <span class="meta">${p.type}</span><br><br>
      ${p.content}<br><br>
      <button onclick="answer('${p.id}')">Answer</button>
    `;

    if(role==="admin"){
      html+=`
      <button onclick="approve('${p.id}')">Approve</button>
      <button onclick="reject('${p.id}')">Reject</button>
      `;
    }

    posts.filter(c=>c.parentId===p.id && c.status==="Approved")
    .forEach(c=>{
      html+=`
      <div class="comment">
        <b>${c.username}</b>: ${c.content}
      </div>
      `;
    });

    html+=`</div>`;
  });

  feed.innerHTML=html;
}

window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    return location.href="login.html";
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    type:type.value,
    parentId:null,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  content.value="";
  load();
};

window.answer = async (id)=>{
  let text=prompt("Write solution");
  if(!text) return;

  await addDoc(collection(db,"posts"),{
    content:text,
    type:"solution",
    parentId:id,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  load();
};

window.approve = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

window.reject = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Rejected"});
  load();
};

window.searchPosts = ()=>{
  let val=search.value.toLowerCase();
  let filtered = posts.filter(p =>
    p.content.toLowerCase().includes(val) &&
    p.status==="Approved"
  );
  render(filtered);
};

window.goLogin = ()=>{
  location.href="login.html";
};

</script>

</body>
</html>
