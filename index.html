<!DOCTYPE html>
<html>
<head>
<style>
body{font-family:Arial;background:#f0f2f5;margin:0;}
.header{background:#1877f2;color:white;padding:10px;text-align:center;}
.container{max-width:500px;margin:auto;padding:10px;}
.card{background:white;padding:10px;margin-bottom:10px;border-radius:10px;}
.comment{background:#eef;padding:5px;margin:5px 0;border-radius:5px;}
button{margin:3px;padding:5px;border:none;background:#1877f2;color:white;}
</style>
</head>

<body>

<div class="header">E-Vedhika</div>

<div class="container">

<!-- CREATE POST -->
<select id="type">
<option value="problem">Problem</option>
<option value="suggestion">Suggestion</option>
<option value="update">Admin Update</option>
</select>

<textarea id="content" placeholder="Write..."></textarea>
<button onclick="addPost()">Post</button>

<hr>

<div id="feed"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let posts=[];
let uid="", username="", role="user";

auth.onAuthStateChanged(async (user)=>{
  if(user){
    uid=user.uid;

    let u = await getDocs(collection(db,"users"));
    u.forEach(d=>{
      if(d.id===uid){
        username=d.data().username;
        role=d.data().role;
      }
    });
  }
  load();
});

async function load(){
  let snap = await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data();
    x.id=d.id;
    posts.push(x);
  });
  render();
}

function render(){
  let html="";

  // MAIN POSTS
  let mainPosts = posts.filter(p=>!p.parentId && p.status==="Approved");

  mainPosts.reverse().forEach(p=>{

    html+=`
    <div class="card">
    <b>${p.username} ${p.role==="admin"?"(Admin)":""}</b><br>
    <small>${p.type.toUpperCase()}</small><br><br>
    ${p.content}<br><br>
    `;

    // ADMIN CONTROLS
    if(role==="admin"){
      html+=`
      <button onclick="approve('${p.id}')">Approve</button>
      <button onclick="reject('${p.id}')">Reject</button>
      `;
    }

    // USER ACTIONS
    if(auth.currentUser){
      html+=`
      <button onclick="addSolution('${p.id}')">Answer</button>
      `;
    }

    // SOLUTIONS (COMMENTS)
    let comments = posts.filter(c=>c.parentId===p.id && c.status==="Approved");

    comments.forEach(c=>{
      html+=`
      <div class="comment">
      <b>${c.username}</b>: ${c.content}
      </div>
      `;
    });

    html+=`</div>`;
  });

  feed.innerHTML=html;
}

// CREATE POST
window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    return;
  }

  // only admin can post updates
  if(type.value==="update" && role!=="admin"){
    alert("Only admin can post updates");
    return;
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    type:type.value,
    parentId:null,
    userId:uid,
    username:username,
    role:role,
    status:"Pending",
    createdAt:new Date()
  });

  content.value="";
  load();
};

// ADD SOLUTION
window.addSolution = async (postId)=>{
  let text = prompt("Write solution");

  if(!text) return;

  await addDoc(collection(db,"posts"),{
    content:text,
    type:"solution",
    parentId:postId,
    userId:uid,
    username:username,
    role:role,
    status:"Pending",
    createdAt:new Date()
  });

  load();
};

// ADMIN ACTIONS
window.approve = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

window.reject = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Rejected"});
  load();
};

</script>

</body>
</html>
