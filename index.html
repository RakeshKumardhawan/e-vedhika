<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;font-family:Arial;background:#f0f2f5;}
.header{background:#1877f2;color:white;padding:10px;text-align:center;}
.container{max-width:500px;margin:auto;padding:10px;}
.card{background:white;padding:10px;margin-bottom:10px;border-radius:10px;}
textarea{width:100%;padding:8px;}
button{margin:5px;padding:6px;border:none;background:#1877f2;color:white;}
</style>
</head>

<body>

<div class="header">
E-Vedhika 
<button onclick="location.href='login.html'">Login</button>
</div>

<div class="container">

<textarea id="content" placeholder="Write your problem..."></textarea>

<select id="type">
<option value="problem">Problem</option>
<option value="suggestion">Suggestion</option>
<option value="update">Admin Update</option>
</select>

<button onclick="addPost()">Post</button>

<hr>

<div id="feed"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let uid="", username="", role="user";
let posts=[];

// NO REDIRECT
auth.onAuthStateChanged(async user=>{
  if(user){
    uid=user.uid;

    let u=await getDocs(collection(db,"users"));
    u.forEach(d=>{
      if(d.id===uid){
        username=d.data().username;
        role=d.data().role;
      }
    });
  }
  load();
});

async function load(){
  let snap=await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data();
    x.id=d.id;
    posts.push(x);
  });
  render();
}

function render(){
  let html="";

  posts
  .filter(p=>!p.parentId && p.status==="Approved")
  .reverse()
  .forEach(p=>{

    html+=`
    <div class="card">
    <b>${p.username} ${p.role==="admin"?"(Admin)":""}</b><br>
    ${p.type}<br><br>
    ${p.content}<br><br>

    <button onclick="answer('${p.id}')">Answer</button>
    `;

    // ADMIN CONTROLS
    if(role==="admin"){
      html+=`
      <button onclick="approve('${p.id}')">Approve</button>
      <button onclick="reject('${p.id}')">Reject</button>
      `;
    }

    // COMMENTS
    posts.filter(c=>c.parentId===p.id && c.status==="Approved")
    .forEach(c=>{
      html+=`<div style="background:#eee;padding:5px;margin-top:5px;border-radius:5px;">
      <b>${c.username}</b>: ${c.content}
      </div>`;
    });

    html+=`</div>`;
  });

  feed.innerHTML=html;
}

// POST
window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    location.href="login.html";
    return;
  }

  if(type.value==="update" && role!=="admin"){
    alert("Only admin can post updates");
    return;
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    type:type.value,
    parentId:null,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  content.value="";
  load();
};

// ANSWER
window.answer = async (id)=>{
  let text=prompt("Write solution");
  if(!text) return;

  await addDoc(collection(db,"posts"),{
    content:text,
    type:"solution",
    parentId:id,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  load();
};

// ADMIN
window.approve = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

window.reject = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Rejected"});
  load();
};

</script>

</body>
</html>
