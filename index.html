<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E-Vedhika</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(120deg,#74ebd5,#9face6);
  overflow:hidden;
}

/* 🔥 BUBBLE BACKGROUND */
.bubbles span{
  position:absolute;
  bottom:-50px;
  width:20px;
  height:20px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  animation:rise 15s infinite ease-in;
}

.bubbles span:nth-child(odd){
  width:25px;height:25px;
}

@keyframes rise{
  0%{transform:translateY(0) scale(0.5);}
  100%{transform:translateY(-100vh) scale(1);}
}

/* HEADER */
h2{
  text-align:center;
  color:white;
  padding:15px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:220px 1fr 280px;
  gap:20px;
  padding:20px;
  position:relative;
  z-index:2;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:15px;
  box-shadow:0 8px 30px rgba(0,0,0,0.2);
  transition:0.3s;
}

.glass:hover{
  transform:translateY(-5px);
}

/* POSTS */
.post{
  background:white;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:8px 12px;
  border:none;
  background:#0072ff;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.scroll-box{
  height:120px;
  overflow:hidden;
}
</style>
</head>

<body>

<!-- 🔥 BUBBLES -->
<div class="bubbles">
  <span style="left:10%;animation-duration:12s"></span>
  <span style="left:20%;animation-duration:15s"></span>
  <span style="left:35%;animation-duration:18s"></span>
  <span style="left:50%;animation-duration:10s"></span>
  <span style="left:65%;animation-duration:14s"></span>
  <span style="left:80%;animation-duration:20s"></span>
</div>

<h2>🌐 E-Vedhika</h2>

<div class="container">

<div class="glass">
<h4>✔ Approved Suggestions</h4>
<div id="approvedBox" class="scroll-box"></div>

<h4>📌 Problems</h4>
<button onclick="showProblemPost()">+ Post Problem</button>
<div id="problemForm" style="display:none;">
<input id="ptitle">
<textarea id="pcontent"></textarea>
<button onclick="addProblem()">Submit</button>
</div>

<div id="problemsBox"></div>

<h4>🛠 Fix Errors</h4>
<div id="solvedBox"></div>
</div>

<div class="glass">
<h3>New Post</h3>
<input id="title">
<textarea id="content"></textarea>
<button onclick="addPost()">Post</button>
<div id="posts"></div>
</div>

<div class="glass">
<h3>Login / Signup</h3>
<input id="email">
<input id="password" type="password">

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

<p id="userInfo"></p>

<hr>

<h3>Chat</h3>
<div id="chatMessages" style="height:200px;overflow:auto;"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);
const auth = getAuth(app);

let currentUser=null;

onAuthStateChanged(auth,(user)=>{
if(user){
currentUser=user;
userInfo.innerText="Logged: "+user.email;
}else{
userInfo.innerText="Not logged";
}
});

window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
alert("Login success");
}catch(e){
alert(e.message);
}
};

window.signup=async()=>{
try{
await createUserWithEmailAndPassword(auth,email.value,password.value);
alert("Signup success");
}catch(e){
alert(e.message);
}
};

window.addPost=async()=>{
if(!currentUser){alert("Login required");return;}

await addDoc(collection(db,"posts"),{
title:title.value,
content:content.value,
createdAt:serverTimestamp()
});

loadPosts();
};

window.showProblemPost=()=>problemForm.style.display="block";

window.addProblem=async()=>{
await addDoc(collection(db,"problems"),{
title:ptitle.value,
content:pcontent.value,
status:"Pending",
createdAt:serverTimestamp()
});
alert("Submitted");
};

window.sendMsg=async()=>{
await addDoc(collection(db,"chat"),{
message:chatInput.value,
createdAt:serverTimestamp()
});
chatInput.value="";
};

function loadChat(){
onSnapshot(collection(db,"chat"),snap=>{
chatMessages.innerHTML="";
snap.forEach(d=>{
chatMessages.innerHTML+=`<div>${d.data().message}</div>`;
});
});
}

async function loadPosts(){
let qs=await getDocs(collection(db,"posts"));
posts.innerHTML="";
qs.forEach(d=>{
let x=d.data();
posts.innerHTML+=`<div class="post">${x.title}<br>${x.content}</div>`;
});
}

async function loadApproved(){
let qs=await getDocs(collection(db,"suggestions"));
approvedBox.innerHTML="";
qs.forEach(d=>{
approvedBox.innerHTML+=`<div class="post">${d.data().suggestion}</div>`;
});

let pos=0;
setInterval(()=>{
pos++;
approvedBox.scrollTop=pos;
if(pos>=approvedBox.scrollHeight-approvedBox.clientHeight) pos=0;
},40);
}

loadPosts();
loadChat();
loadApproved();

</script>

</body>
</html>
