<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f6f9;
}

/* HEADER */
.header{
  text-align:center;
  background:#2196f3;
  color:white;
  padding:10px;
}

.tagline{
  font-size:12px;
  opacity:0.8;
}

/* SEARCH */
.search{
  padding:10px;
  text-align:center;
}

.search input{
  width:90%;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* LAYOUT */
.main{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:10px;
  padding:10px;
}

/* MOBILE */
@media(max-width:768px){
  .main{
    grid-template-columns:1fr;
  }
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* BUTTON */
button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#2196f3;
  color:white;
  margin-top:5px;
}

/* POST */
.post{
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.meta{
  font-size:12px;
  color:gray;
}

.comment{
  background:#eef;
  padding:6px;
  margin-top:5px;
  border-radius:6px;
}

/* LOGIN BOX */
.login-card{
  text-align:center;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>E-Vedhika</h2>
  <div class="tagline">All solutions at one place</div>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Search..." onkeyup="searchPosts()">
</div>

<div class="main">

<!-- LEFT -->
<div>
  <div class="card">✔ Approved Suggestions</div>
  <div class="card">📌 Post Problems</div>
  <div class="card">📘 How to Fix Errors</div>
</div>

<!-- CENTER -->
<div>

<div class="card">
  <textarea id="content" placeholder="Write your issue..." style="width:100%"></textarea>

  <select id="type">
    <option value="problem">Problem</option>
    <option value="suggestion">Suggestion</option>
    <option value="update">Update</option>
  </select>

  <button onclick="addPost()">Post</button>
</div>

<div id="feed"></div>

</div>

<!-- RIGHT -->
<div>

<div class="card login-card">
  <h3>Welcome</h3>
  <button onclick="goLogin()">Login / Signup</button>
</div>

<div class="card">📢 Union Updates (Login only)</div>
<div class="card">💬 Comments & Discuss</div>

</div>

</div>

<!-- FOOTER -->
<div class="main">

<div class="card">🌐 Translation</div>
<div class="card">🤖 AI Chatbot</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let posts=[];
let uid="", username="", role="user";

// LOGIN CHECK
auth.onAuthStateChanged(async user=>{
  if(user){
    uid=user.uid;

    let u=await getDocs(collection(db,"users"));
    u.forEach(d=>{
      if(d.id===uid){
        username=d.data().username;
        role=d.data().role;
      }
    });
  }
  load();
});

// LOAD POSTS
async function load(){
  let snap=await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data();
    x.id=d.id;
    posts.push(x);
  });
  render(posts);
}

// RENDER
function render(data){
  let html="";

  data.filter(p=>!p.parentId && p.status==="Approved")
  .reverse()
  .forEach(p=>{

    html+=`
    <div class="card">
      <b>${p.username} ${p.role==="admin"?"(Admin)":""}</b><br>
      <span class="meta">${p.type}</span><br><br>

      ${p.content}<br><br>

      <button onclick="answer('${p.id}')">Answer</button>
    `;

    if(role==="admin"){
      html+=`
      <button onclick="approve('${p.id}')">Approve</button>
      `;
    }

    posts.filter(c=>c.parentId===p.id && c.status==="Approved")
    .forEach(c=>{
      html+=`
      <div class="comment">
        <b>${c.username}</b>: ${c.content}
      </div>
      `;
    });

    html+=`</div>`;
  });

  feed.innerHTML=html;
}

// ADD POST
window.addPost = async ()=>{
  if(!auth.currentUser){
    alert("Login required");
    return location.href="login.html";
  }

  await addDoc(collection(db,"posts"),{
    content:content.value,
    type:type.value,
    parentId:null,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  content.value="";
  load();
};

// COMMENT
window.answer = async (id)=>{
  let text=prompt("Write solution");
  if(!text) return;

  await addDoc(collection(db,"posts"),{
    content:text,
    type:"solution",
    parentId:id,
    userId:uid,
    username:username,
    role:role,
    status:"Pending"
  });

  load();
};

// APPROVE
window.approve = async (id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

// SEARCH
window.searchPosts = ()=>{
  let val=search.value.toLowerCase();
  let filtered = posts.filter(p =>
    p.content.toLowerCase().includes(val) &&
    p.status==="Approved"
  );
  render(filtered);
};

// LOGIN
window.goLogin = ()=>{
  location.href="login.html";
};

</script>

</body>
</html>
