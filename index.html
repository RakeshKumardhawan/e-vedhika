<div id="schemesData">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
  authDomain:"e-vedhika-258f2.firebaseapp.com",
  projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);

async function loadSchemes(){

  let el = document.getElementById("schemesData");

  if(!el){
    console.error("schemesData div not found ❌");
    return;
  }

  try{
    let qs = await getDocs(collection(db,"posts"));

    let html="";

    qs.forEach(doc=>{
      let d = doc.data();
      html += `<p><b>${d.title}</b> - ${d.content}</p>`;
    });

    el.innerHTML = html || "No data";

  }catch(e){
    console.error(e);
    el.innerHTML = "Error loading data";
  }
}

document.addEventListener("DOMContentLoaded", loadSchemes);

</script>
