<!DOCTYPE html>
<html>
<body>

<button onclick="history.back()">⬅ Back</button>

<h2>Submit Problem</h2>
<input id="title" placeholder="Title"><br>
<textarea id="content" placeholder="Content"></textarea><br>
<button onclick="save()">Submit</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});
const db = getFirestore(app);

window.save = async ()=>{
await addDoc(collection(db,"posts"),{
title:title.value,
content:content.value,
status:"Pending",
userType:"public"
});
alert("Submitted");
};
</script>

</body>
</html>
