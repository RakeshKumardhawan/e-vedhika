<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Suggestion Portal</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  text-align:center;
}

.box{
  background:white;
  width:400px;
  margin:auto;
  margin-top:40px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px gray;
}

input,textarea,select{
  width:90%;
  padding:8px;
  margin:8px 0;
}

button{
  background:green;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:darkgreen;
}
</style>
</head>

<body onload="welcomeAlert()">

<div class="box" id="mainBox">

<h2>e-Vedhika Suggestion Portal</h2>
<p>మీ సూచనలు నమోదు చేయండి</p>

<input id="name" placeholder="మీ పేరు">
<input id="village" placeholder="జిల్లా / మండలం">
<input id="mobile" maxlength="10" placeholder="మొబైల్ నంబర్">

<select id="category">
<option value="">విభాగం ఎంచుకోండి</option>
<option>Home</option>
<option>Latest News</option>
<option>Services</option>
<option>Public Suggestions</option>
<option>Discussion Forum</option>
<option>User Login</option>
<option>FAQ</option>
<option>Search</option>
<option>Union Updates</option>
</select>

<textarea id="suggestion" placeholder="మీ సూచన"></textarea>

<button onclick="addSuggestion()">Submit</button>

<button onclick="goHome()" style="background:#0d3b66;margin-left:10px">Back to Website</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
  authDomain:"e-vedhika-258f2.firebaseapp.com",
  projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);

window.welcomeAlert = ()=>{
  alert("Welcome to e-Vedhika Suggestion Portal");
};

window.addSuggestion = async ()=>{

  let name = document.getElementById("name").value.trim();
  let village = document.getElementById("village").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let category = document.getElementById("category").value;
  let suggestion = document.getElementById("suggestion").value.trim();

  if(!name || !village || !mobile || !category || !suggestion){
    alert("దయచేసి అన్ని వివరాలు నింపండి");
    return;
  }

  if(!/^[0-9]{10}$/.test(mobile)){
    alert("10 digit mobile number enter cheyandi");
    return;
  }

  await addDoc(collection(db,"suggestions"),{
    name,
    village,
    mobile,
    category,
    suggestion,
    createdAt: new Date(),
    status:"pending"
  });

  // 🔥 SUCCESS SCREEN
  document.getElementById("mainBox").innerHTML = `
    <h2>✅ Submitted Successfully</h2>
    <p>మీ సూచన నమోదు చేయబడింది</p>

    <button onclick="location.reload()">Add More Suggestions</button>

    <button onclick="goHome()" style="background:#0d3b66;margin-top:10px">
      Go to Main Website
    </button>
  `;
};

// 🔥 REDIRECT FIX (IMPORTANT)
window.goHome = ()=>{
  window.location.href = "https://rakeshkumardhawan.github.io/e-vedhika/";
};

</script>

</body>
</html>
