<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;}

button{padding:6px 12px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
.accept-btn{background:green;color:white;}
.delete-btn{background:red;color:white;}
.edit-btn{background:#0072ff;color:white;}

.pending{background:orange;color:white;}
.approved{background:green;color:white;}
.deleted{background:red;color:white;}

table{margin:auto;margin-top:20px;border-collapse:collapse;width:95%;background:white;}
th,td{padding:8px;border:1px solid #ddd;font-size:13px;}
th{background:#2c3e50;color:white;}

input,textarea{padding:8px;margin:5px;width:250px;}
</style>
</head>

<body>

<h2>📊 Admin Dashboard</h2>

<button onclick="loadSuggestions()">Suggestions</button>
<button onclick="loadProfiles()">Profiles</button>
<button onclick="loadPosts()">Public Posts</button>
<button onclick="loadAdminPosts()">Admin Posts</button>
<button onclick="loadLogs()">Logs</button>

<table>
<thead><tr id="header"></tr></thead>
<tbody id="data"></tbody>
</table>

<!-- 🔥 ADMIN POST -->
<h3>➕ Admin Post</h3>
<input id="p_title" placeholder="Title"><br>
<textarea id="p_content" placeholder="Content"></textarea><br>
<button onclick="addAdminPost()" class="accept-btn">Post</button>

<!-- 🔥 NEW UPDATES SECTION -->
<h3>🔥 New Updates</h3>

<div id="updatesBox"></div>

<input id="newUpdateText" placeholder="Write update">
<button onclick="addUpdate()" class="accept-btn">Add</button>

<!-- 📊 ANALYTICS -->
<h3>📊 Activity Analytics</h3>
<canvas id="logChart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);

/* 🔥 NEW UPDATES */
async function loadUpdates(){
let qs=await getDocs(collection(db,"updates"));
let html="";
qs.forEach((d,i)=>{
let x=d.data();
html+=`
<div>
${i+1}. ${x.text}
<button onclick="deleteUpdate('${d.id}')">❌</button>
</div>`;
});
updatesBox.innerHTML=html;
}

window.addUpdate=async()=>{
await addDoc(collection(db,"updates"),{
text:newUpdateText.value,
time:serverTimestamp()
});
newUpdateText.value="";
loadUpdates();
};

window.deleteUpdate=async(id)=>{
await deleteDoc(doc(db,"updates",id));
loadUpdates();
};

/* 🔥 ADMIN POST */
window.addAdminPost=async()=>{
await addDoc(collection(db,"posts"),{
title:p_title.value,
content:p_content.value,
userType:"admin",
status:"Approved",
isNew:true,
createdAt:serverTimestamp()
});
};

/* 📊 LOGS + GRAPH */
window.loadLogs=async()=>{
let qs=await getDocs(collection(db,"logs"));
let arr=[];
qs.forEach(d=>arr.push(d.data()));

let counts={};
arr.forEach(l=>{
counts[l.action]=(counts[l.action]||0)+1;
});

new Chart(document.getElementById("logChart"),{
type:"bar",
data:{
labels:Object.keys(counts),
datasets:[{label:"Actions",data:Object.values(counts)}]
}
});
};

/* INIT */
loadUpdates();

</script>

</body>
</html>
