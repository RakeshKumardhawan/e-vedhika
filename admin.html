<!DOCTYPE html>
<html>
<body>
<h2>Admin Panel</h2>
<div id="list"></div>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let posts=[];

async function load(){
  let snap=await getDocs(collection(db,"posts"));
  posts=[];
  snap.forEach(d=>{
    let x=d.data(); x.id=d.id;
    posts.push(x);
  });

  let html="";
  posts.filter(p=>p.status==="Pending")
  .forEach(p=>{
    html+=`
    <div>
    ${p.content}
    <button onclick="approve('${p.id}')">Approve</button>
    </div>`;
  });

  list.innerHTML=html;
}

window.approve=async(id)=>{
  await updateDoc(doc(db,"posts",id),{status:"Approved"});
  load();
};

load();
</script>
</body>
</html>
