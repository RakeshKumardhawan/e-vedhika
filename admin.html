<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;}

button{padding:6px 12px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
.accept-btn{background:green;color:white;}
.delete-btn{background:red;color:white;}
.edit-btn{background:#0072ff;color:white;}
.block-btn{background:black;color:white;}

.pending{background:orange;color:white;}
.accepted{background:green;color:white;}
.trash{background:red;color:white;}
.all{background:#444;color:white;}

#notifyBtn{
position:absolute;right:20px;top:10px;
background:#333;color:white;padding:8px;border-radius:50%;
}

#notifyBox{
display:none;
position:absolute;
right:20px;top:50px;
background:white;
width:250px;
max-height:300px;
overflow:auto;
border-radius:10px;
padding:10px;
box-shadow:0 0 10px #999;
}

input, textarea, select{padding:8px;margin:5px;width:250px;}

table{margin:auto;margin-top:20px;border-collapse:collapse;width:95%;background:white;}
th,td{padding:8px;border:1px solid #ddd;font-size:13px;}
th{background:#2c3e50;color:white;}
</style>
</head>

<body>

<button id="notifyBtn" onclick="toggleNotify()">🔔</button>
<div id="notifyBox"></div>

<h2>📊 Admin Dashboard</h2>

<button onclick="loadSuggestions()">📊 Suggestions</button>
<button onclick="loadProfiles()">👤 Profiles</button>
<button onclick="loadPosts()">📝 Public Posts</button>
<button onclick="loadAdminPosts()">📰 Admin Posts</button>

<br>

<button class="pending" onclick="filterStatus('Pending')">Pending</button>
<button class="accepted" onclick="filterStatus('Approved')">Approved</button>
<button class="trash" onclick="filterStatus('Deleted')">Deleted</button>
<button class="all" onclick="showAll()">All</button>

<table>
<thead><tr id="header"></tr></thead>
<tbody id="data"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, serverTimestamp, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);

let currentType="";
let fullData=[];
let notifications=[];

/* 🔔 NOTIFICATION */
function addNotify(msg){
notifications.unshift(msg);
renderNotify();
}

function toggleNotify(){
let box=document.getElementById("notifyBox");
box.style.display=box.style.display==="block"?"none":"block";
}

function renderNotify(){
notifyBox.innerHTML="";
notifications.forEach(n=>{
notifyBox.innerHTML+=`<div>${n}</div><hr>`;
});
}

/* 🔔 REALTIME */
["posts","profiles","suggestions"].forEach(col=>{
onSnapshot(collection(db,col),(snap)=>{
snap.docChanges().forEach(c=>{
if(c.type==="added"){
addNotify("New "+col+" added");
}
});
});
});

/* HEADER */
function setHeader(){
let h=header;

if(currentType==="profiles"){
h.innerHTML=`<th>#</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th>`;
}
else{
h.innerHTML=`<th>#</th><th>Title</th><th>Content</th><th>Status</th><th>Action</th>`;
}
}

/* LOAD */
window.loadSuggestions=()=>loadData("suggestions");
window.loadProfiles=()=>loadData("profiles");

window.loadPosts=async()=>{
currentType="posts"; setHeader();
let qs=await getDocs(collection(db,"posts"));
let arr=[];
qs.forEach(d=>{
let x=d.data();
if(x.userType!=="admin") arr.push({id:d.id,...x});
});
fullData=arr; displayData(arr);
};

window.loadAdminPosts=async()=>{
currentType="posts"; setHeader();
let qs=await getDocs(collection(db,"posts"));
let arr=[];
qs.forEach(d=>{
let x=d.data();
if(x.userType==="admin") arr.push({id:d.id,...x});
});
fullData=arr; displayData(arr);
};

async function loadData(type){
currentType=type; setHeader();
let qs=await getDocs(collection(db,type));
let arr=[]; qs.forEach(d=>arr.push({id:d.id,...d.data()}));
fullData=arr; displayData(arr);
}

/* FILTER FIX */
window.filterStatus=(status)=>{
let f=fullData.filter(d=>{
let s=d.status||"Pending";
if(status==="Approved") return s==="Approved"||s==="Accepted";
return s===status;
});
displayData(f);
};

window.showAll=()=>displayData(fullData);

/* ACTIONS */
window.acceptRow=async(id)=>{
await updateDoc(doc(db,currentType,id),{status:"Approved"});
addNotify("Item approved");
loadData(currentType);
};

window.deleteRow=async(id)=>{
await updateDoc(doc(db,currentType,id),{status:"Deleted"});
addNotify("Item deleted");
loadData(currentType);
};

/* EDIT POST */
window.editRow=async(id)=>{
let newText=prompt("Edit content:");
if(!newText) return;
await updateDoc(doc(db,currentType,id),{content:newText});
addNotify("Post edited");
loadData(currentType);
};

/* PROFILE ROLE */
window.changeRole=async(id)=>{
let role=prompt("Enter role: admin/moderator/user");
if(!role) return;
await updateDoc(doc(db,"profiles",id),{role});
addNotify("Role updated");
loadData("profiles");
};

/* BLOCK / UNBLOCK */
window.blockUser=async(id)=>{
await updateDoc(doc(db,"profiles",id),{status:"blocked"});
addNotify("User blocked");
loadData("profiles");
};

window.unblockUser=async(id)=>{
await updateDoc(doc(db,"profiles",id),{status:"active"});
addNotify("User unblocked");
loadData("profiles");
};

/* KICK (5 MIN) */
window.kickUser=async(id)=>{
let time=Date.now()+5*60*1000;
await updateDoc(doc(db,"profiles",id),{kickUntil:time});
addNotify("User kicked for 5 mins");
};

/* DISPLAY */
function displayData(arr){
data.innerHTML="";

arr.forEach((d,i)=>{

if(currentType==="profiles"){
data.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${d.email||""}</td>
<td>${d.role||"user"}</td>
<td>${d.status||"active"}</td>
<td>
<button onclick="changeRole('${d.id}')">Role</button>
<button onclick="blockUser('${d.id}')">Block</button>
<button onclick="unblockUser('${d.id}')">Unblock</button>
<button onclick="kickUser('${d.id}')">Kick</button>
</td>
</tr>`;
}

else{
data.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${d.title||""}</td>
<td>${d.content||d.suggestion||""}</td>
<td>${d.status||"Pending"}</td>
<td>
<button class="accept-btn" onclick="acceptRow('${d.id}')">Accept</button>
<button class="edit-btn" onclick="editRow('${d.id}')">Edit</button>
<button class="delete-btn" onclick="deleteRow('${d.id}')">Delete</button>
</td>
</tr>`;
}

});

}

loadSuggestions();

</script>

</body>
</html>
