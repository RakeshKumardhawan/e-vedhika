<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;margin:0;padding:10px;}

button{padding:6px 10px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
.accept-btn{background:green;color:white;}
.delete-btn{background:red;color:white;}
.edit-btn{background:#0072ff;color:white;}

#topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

#statsBox{
font-size:14px;
color:#333;
}

#notifyBtn{
background:#333;color:white;border-radius:50%;
padding:6px 10px;
}

#notifyBox{
display:none;
position:absolute;
right:10px;top:40px;
background:white;
width:220px;
max-height:250px;
overflow:auto;
border-radius:8px;
box-shadow:0 0 10px #aaa;
padding:8px;
}

input{
padding:6px;
width:200px;
}

table{
margin:auto;
margin-top:10px;
border-collapse:collapse;
width:95%;
background:white;
}

th,td{
padding:6px;
border:1px solid #ddd;
font-size:13px;
}

th{background:#2c3e50;color:white;}

canvas{
max-width:350px;
margin:5px auto;
display:block;
}
</style>
</head>

<body>

<div id="topBar">
<div id="statsBox">Loading...</div>
<button id="notifyBtn" onclick="toggleNotify()">🔔</button>
</div>

<div id="notifyBox"></div>

<h3>Admin Dashboard</h3>

<input id="searchBox" placeholder="Search..." oninput="searchData()">
<button onclick="exportCSV()">Export</button>

<br>

<button onclick="loadSuggestions()">Suggestions</button>
<button onclick="loadProfiles()">Profiles</button>
<button onclick="loadPosts()">Posts</button>

<canvas id="chartBox"></canvas>

<table>
<thead><tr id="header"></tr></thead>
<tbody id="data"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import Chart from "https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);
const auth = getAuth(app);

let currentType="", fullData=[], notifications=[];

/* LOGIN TRACK */
onAuthStateChanged(auth,(user)=>{
if(user){
addDoc(collection(db,"logins"),{
email:user.email,
time:serverTimestamp()
});
}
});

/* NOTIFY */
function addNotify(msg){
notifications.unshift(msg);
renderNotify();
}
function toggleNotify(){
notifyBox.style.display=notifyBox.style.display==="block"?"none":"block";
}
function renderNotify(){
notifyBox.innerHTML="";
notifications.slice(0,10).forEach(n=>{
notifyBox.innerHTML+=`<div>${n}</div><hr>`;
});
}

/* STATS */
async function loadStats(){
let s=await getDocs(collection(db,"suggestions"));
let p=await getDocs(collection(db,"posts"));
let u=await getDocs(collection(db,"profiles"));

statsBox.innerText=`Suggestions:${s.size} | Posts:${p.size} | Users:${u.size}`;
}

/* GRAPH */
let chart;
async function loadGraph(){
let s=await getDocs(collection(db,"suggestions"));
let p=await getDocs(collection(db,"posts"));

if(chart) chart.destroy();

chart=new Chart(chartBox,{
type:"bar",
data:{
labels:["Suggestions","Posts"],
datasets:[{data:[s.size,p.size]}]
}
});
}

/* SEARCH */
window.searchData=()=>{
let q=searchBox.value.toLowerCase();
let f=fullData.filter(d=>(d.title||d.name||"").toLowerCase().includes(q));
displayData(f);
};

/* EXPORT */
window.exportCSV=()=>{
let csv="data\n";
fullData.forEach(d=>csv+=JSON.stringify(d)+"\n");
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="report.csv";
a.click();
};

/* LOAD */
window.loadSuggestions=()=>loadData("suggestions");
window.loadProfiles=()=>loadData("profiles");
window.loadPosts=()=>loadData("posts");

async function loadData(type){
currentType=type;
let qs=await getDocs(collection(db,type));
let arr=[]; qs.forEach(d=>arr.push({id:d.id,...d.data()}));
fullData=arr;
displayData(arr);
addNotify(type+" loaded");
}

/* ACTION */
window.acceptRow=async(id)=>{
await updateDoc(doc(db,currentType,id),{status:"Approved"});
loadData(currentType);
};

window.deleteRow=async(id)=>{
await updateDoc(doc(db,currentType,id),{status:"Deleted"});
loadData(currentType);
};

window.editRow=async(id)=>{
let txt=prompt("Edit:");
if(!txt) return;
await updateDoc(doc(db,currentType,id),{content:txt});
loadData(currentType);
};

/* DISPLAY */
function displayData(arr){
data.innerHTML="";
arr.forEach((d,i)=>{
data.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${d.title||d.name||""}</td>
<td>${d.content||d.suggestion||""}</td>
<td>${d.status||""}</td>
<td>
<button onclick="acceptRow('${d.id}')">✔</button>
<button onclick="editRow('${d.id}')">✏</button>
<button onclick="deleteRow('${d.id}')">✖</button>
</td>
</tr>`;
});
}

/* INIT */
loadStats();
loadGraph();

</script>

</body>
</html>
