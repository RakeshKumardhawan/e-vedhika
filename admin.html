<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;}

button{padding:6px 12px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
.accept-btn{background:green;color:white;}
.delete-btn{background:red;color:white;}
.edit-btn{background:#0072ff;color:white;}
.block-btn{background:black;color:white;}
.role-btn{background:#555;color:white;}

.pending{background:orange;color:white;}
.approved{background:green;color:white;}
.deleted{background:red;color:white;}

input,textarea{padding:8px;margin:5px;width:250px;}

table{margin:auto;margin-top:20px;border-collapse:collapse;width:95%;background:white;}
th,td{padding:8px;border:1px solid #ddd;font-size:13px;}
th{background:#2c3e50;color:white;}
</style>
</head>

<body>

<h2>📊 Admin Dashboard</h2>

<button onclick="loadSuggestions()">📊 Suggestions</button>
<button onclick="loadProfiles()">👤 Profiles</button>
<button onclick="loadPosts()">📝 Public Posts</button>
<button onclick="loadAdminPosts()">📰 Admin Posts</button>

<br>

<button class="pending" onclick="filterStatus('Pending')">Pending</button>
<button class="approved" onclick="filterStatus('Approved')">Approved</button>
<button class="deleted" onclick="filterStatus('Deleted')">Deleted</button>
<button onclick="showAll()">All</button>

<br>

<input id="searchBox" placeholder="Search..." oninput="searchData()">

<table>
<thead><tr id="header"></tr></thead>
<tbody id="data"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);

let currentType="", fullData=[];
let userRole="admin"; // change dynamic if needed

/* LOG TRACK */
async function logAction(action,data){
await addDoc(collection(db,"logs"),{
action,
data,
time:serverTimestamp()
});
}

/* HEADER */
function setHeader(){
if(currentType==="profiles"){
header.innerHTML=`<th>#</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th>`;
}else{
header.innerHTML=`<th>#</th><th>Title</th><th>Content</th><th>Status</th><th>Action</th>`;
}
}

/* LOAD */
window.loadSuggestions=()=>loadData("suggestions");
window.loadProfiles=()=>loadData("profiles");

window.loadPosts=async()=>{
currentType="posts"; setHeader();
let qs=await getDocs(collection(db,"posts"));
let arr=[];
qs.forEach(d=>{
let x=d.data();
if(x.userType!=="admin") arr.push({id:d.id,...x});
});
fullData=arr;
displayData(arr);
};

window.loadAdminPosts=async()=>{
currentType="posts"; setHeader();
let qs=await getDocs(collection(db,"posts"));
let arr=[];
qs.forEach(d=>{
let x=d.data();
if(x.userType==="admin") arr.push({id:d.id,...x});
});
fullData=arr;
displayData(arr);
};

async function loadData(type){
currentType=type;
setHeader();

let qs=await getDocs(collection(db,type));
let arr=[];
qs.forEach(d=>arr.push({id:d.id,...d.data()}));

fullData=arr;
displayData(arr);
}

/* FILTER */
window.filterStatus=(status)=>{
let f=fullData.filter(d=>{
let s=d.status||"Pending";
if(status==="Approved") return s==="Approved"||s==="Accepted";
return s===status;
});
displayData(f);
};

window.showAll=()=>displayData(fullData);

/* SEARCH */
window.searchData=()=>{
let q=searchBox.value.toLowerCase();
displayData(fullData.filter(d=>
(d.title||d.name||"").toLowerCase().includes(q) ||
(d.content||d.suggestion||"").toLowerCase().includes(q)
));
};

/* ACTION */
window.acceptRow=async(id)=>{
await updateDoc(doc(db,currentType,id),{status:"Approved"});
logAction("approve",id);
loadData(currentType);
};

window.deleteRow=async(id)=>{
if(userRole!=="admin"){alert("Only admin");return;}
await updateDoc(doc(db,currentType,id),{status:"Deleted"});
logAction("delete",id);
loadData(currentType);
};

window.editRow=async(id)=>{
let txt=prompt("Edit:");
if(!txt) return;
await updateDoc(doc(db,currentType,id),{content:txt});
logAction("edit",id);
loadData(currentType);
};

/* PROFILE */
window.changeRole=async(id)=>{
if(userRole!=="admin"){alert("Only admin");return;}
let role=prompt("admin / moderator / operator / user");
if(!role) return;
await updateDoc(doc(db,"profiles",id),{role});
logAction("role change",id);
loadData("profiles");
};

window.blockUser=async(id)=>{
await updateDoc(doc(db,"profiles",id),{status:"blocked"});
logAction("block",id);
loadData("profiles");
};

window.unblockUser=async(id)=>{
await updateDoc(doc(db,"profiles",id),{status:"active"});
logAction("unblock",id);
loadData("profiles");
};

window.kickUser=async(id)=>{
await updateDoc(doc(db,"profiles",id),{kickUntil:Date.now()+300000});
logAction("kick",id);
};

window.deleteProfile=async(id)=>{
if(userRole!=="admin"){alert("Only admin");return;}
await deleteDoc(doc(db,"profiles",id));
logAction("profile delete",id);
loadData("profiles");
};

/* DISPLAY */
function displayData(arr){
data.innerHTML="";

arr.forEach((d,i)=>{
let status=d.status||"Pending";
let cls=status==="Approved"?"approved":status==="Deleted"?"deleted":"pending";

if(currentType==="profiles"){
data.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${d.email||""}</td>
<td>${d.role||"user"}</td>
<td class="${cls}">${status}</td>
<td>
<button onclick="changeRole('${d.id}')">Role</button>
<button onclick="blockUser('${d.id}')">Block</button>
<button onclick="unblockUser('${d.id}')">Unblock</button>
<button onclick="kickUser('${d.id}')">Kick</button>
<button class="delete-btn" onclick="deleteProfile('${d.id}')">Delete</button>
</td>
</tr>`;
}
else{
data.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${d.title||d.name||""}</td>
<td>${d.content||d.suggestion||""}</td>
<td class="${cls}">${status}</td>
<td>
<button class="accept-btn" onclick="acceptRow('${d.id}')">Accept</button>
<button class="edit-btn" onclick="editRow('${d.id}')">Edit</button>
<button class="delete-btn" onclick="deleteRow('${d.id}')">Delete</button>
</td>
</tr>`;
}
});
}

</script>

</body>
</html>
