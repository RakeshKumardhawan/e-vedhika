<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;}

button{padding:6px 12px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
.accept-btn{background:green;color:white;}
.delete-btn{background:red;color:white;}
.edit-btn{background:#0072ff;color:white;}
.block-btn{background:black;color:white;}
.role-btn{background:#555;color:white;}

.pending{background:orange;color:white;}
.approved{background:green;color:white;}
.deleted{background:red;color:white;}

input,textarea{padding:8px;margin:5px;width:250px;}

table{margin:auto;margin-top:20px;border-collapse:collapse;width:95%;background:white;}
th,td{padding:8px;border:1px solid #ddd;font-size:13px;}
th{background:#2c3e50;color:white;}
</style>
</head>

<body>

<h2>📊 Admin Dashboard</h2>

<button onclick="loadSuggestions()">📊 Suggestions</button>
<button onclick="loadProfiles()">👤 Profiles</button>
<button onclick="loadPosts()">📝 Public Posts</button>
<button onclick="loadAdminPosts()">📰 Admin Posts</button>

<br>

<button class="pending" onclick="filterData('Pending')">Pending</button>
<button class="approved" onclick="filterData('Approved')">Approved</button>
<button class="deleted" onclick="filterData('Deleted')">Deleted</button>
<button onclick="showAll()">All</button>

<table>
<thead><tr id="header"></tr></thead>
<tbody id="data"></tbody>
</table>

<h3>➕ Admin Post</h3>
<input id="p_title" placeholder="Title"><br>
<textarea id="p_content" placeholder="Content"></textarea><br>
<button onclick="addAdminPost()" class="accept-btn">Post</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

/* 🔥 FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
authDomain:"e-vedhika-258f2.firebaseapp.com",
projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* 🔐 ROLE SYSTEM */
let currentUserRole="guest";

/* 🔒 INDEX RESTRICTIONS */
onAuthStateChanged(auth, async(user)=>{
if(!user) return;

let qs=await getDocs(collection(db,"profiles"));

qs.forEach(d=>{
let x=d.data();

if(x.email===user.email){

currentUserRole=x.role||"user";

/* BLOCK */
if(x.status==="blocked"){
alert("Blocked by admin");
signOut(auth);
}

/* KICK */
if(x.kickUntil && Date.now()<x.kickUntil){
alert("Temporarily removed");
signOut(auth);
}

}
});

/* LOGIN LOG */
await addDoc(collection(db,"logs"),{
type:"login",
email:user.email,
time:serverTimestamp()
});

});

/* ROLE HELPERS */
function isAdmin(){return currentUserRole==="admin";}
function isModerator(){return currentUserRole==="admin"||currentUserRole==="moderator";}

/* ADMIN PANEL */
let currentType="", fullData=[];

async function log(action,id){
await addDoc(collection(db,"logs"),{action,id,time:serverTimestamp()});
}

function setHeader(){
if(currentType==="profiles"){
header.innerHTML=`<th>#</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th>`;
}else{
header.innerHTML=`<th>#</th><th>Title</th><th>Content</th><th>Status</th><th>Action</th>`;
}
}

window.loadSuggestions=()=>load("suggestions");
window.loadProfiles=()=>load("profiles");

window.loadPosts=async()=>{
currentType="posts"; setHeader();
let qs=await getDocs(collection(db,"posts"));
let arr=[];
qs.forEach(d=>{
if(d.data().userType!=="admin") arr.push({id:d.id,...d.data()});
});
fullData=arr; display(arr);
};

window.loadAdminPosts=async()=>{
currentType="posts"; setHeader();
let qs=await getDocs(collection(db,"posts"));
let arr=[];
qs.forEach(d=>{
if(d.data().userType==="admin") arr.push({id:d.id,...d.data()});
});
fullData=arr; display(arr);
};

async function load(type){
currentType=type;
setHeader();
let qs=await getDocs(collection(db,type));
let arr=[];
qs.forEach(d=>arr.push({id:d.id,...d.data()}));
fullData=arr;
display(arr);
}

window.filterData=(status)=>{
display(fullData.filter(d=>{
let s=d.status||"Pending";
if(status==="Approved") return s==="Approved"||s==="Accepted";
return s===status;
}));
};

window.showAll=()=>display(fullData);

/* ACTIONS */
window.acceptRow=async(id)=>{
if(!isModerator()) return alert("Moderator only");
await updateDoc(doc(db,currentType,id),{status:"Approved"});
log("approve",id);
load(currentType);
};

window.deleteRow=async(id)=>{
if(!isAdmin()) return alert("Admin only");
await updateDoc(doc(db,currentType,id),{status:"Deleted"});
log("delete",id);
load(currentType);
};

window.editRow=async(id)=>{
let txt=prompt("Edit:");
if(!txt) return;
await updateDoc(doc(db,currentType,id),{content:txt});
log("edit",id);
load(currentType);
};

/* PROFILE */
window.updateRole=async(id,role)=>{
if(!isAdmin()) return alert("Admin only");
await updateDoc(doc(db,"profiles",id),{role});
log("role",id);
};

window.blockUser=async(id)=>{
await updateDoc(doc(db,"profiles",id),{status:"blocked"});
log("block",id);
load("profiles");
};

window.unblockUser=async(id)=>{
await updateDoc(doc(db,"profiles",id),{status:"active"});
log("unblock",id);
load("profiles");
};

window.kickUser=async(id)=>{
await updateDoc(doc(db,"profiles",id),{kickUntil:Date.now()+300000});
log("kick",id);
};

window.deleteProfile=async(id)=>{
if(!isAdmin()) return;
await deleteDoc(doc(db,"profiles",id));
log("delete profile",id);
load("profiles");
};

/* ADMIN POST */
window.addAdminPost=async()=>{
if(!isAdmin()) return alert("Admin only");
await addDoc(collection(db,"posts"),{
title:p_title.value,
content:p_content.value,
userType:"admin",
status:"Approved",
createdAt:serverTimestamp()
});
log("admin post","new");
loadAdminPosts();
};

/* DISPLAY */
function display(arr){
data.innerHTML="";
arr.forEach((d,i)=>{
let s=d.status||"Pending";
if(s==="Accepted") s="Approved";

let cls=s==="Approved"?"approved":s==="Deleted"?"deleted":"pending";

if(currentType==="profiles"){
data.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${d.email}</td>
<td>
<select onchange="updateRole('${d.id}',this.value)">
<option value="user" ${d.role==="user"?"selected":""}>user</option>
<option value="operator" ${d.role==="operator"?"selected":""}>operator</option>
<option value="moderator" ${d.role==="moderator"?"selected":""}>moderator</option>
<option value="admin" ${d.role==="admin"?"selected":""}>admin</option>
</select>
</td>
<td class="${cls}">${s}</td>
<td>
<button onclick="blockUser('${d.id}')">Block</button>
<button onclick="unblockUser('${d.id}')">Unblock</button>
<button onclick="kickUser('${d.id}')">Kick</button>
<button class="delete-btn" onclick="deleteProfile('${d.id}')">Delete</button>
</td>
</tr>`;
}else{
data.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${d.title||d.name}</td>
<td>${d.content||d.suggestion}</td>
<td class="${cls}">${s}</td>
<td>
<button class="accept-btn" onclick="acceptRow('${d.id}')">Accept</button>
<button class="edit-btn" onclick="editRow('${d.id}')">Edit</button>
<button class="delete-btn" onclick="deleteRow('${d.id}')">Delete</button>
</td>
</tr>`;
}
});
}

</script>

</body>
</html>
