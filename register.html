<body>
<header>

</header>

<div class="wrapper">
<h2>Signup</h2>
<input id="surname" placeholder="Surname *">
<input id="name" placeholder="Name *">
<input id="username" placeholder="Display Name / Username *">

<select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<select id="state"><option value="">Select State</option><option>Telangana</option></select>
<select id="district"><option>Select District</option></select>
<select id="mandal"><option>Select Mandal</option></select>

<input id="village" placeholder="Enter Village / GP (Optional)">
<input id="mobile" placeholder="Mobile No *">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password (min 6 chars)">

<button onclick="register()">Submit</button>
<button onclick="googleLogin()" style="background:#db4437">Login with Google</button>

<a href="https://rakeshkumardhawan.github.io/e-vedhika/" class="btn-link" style="text-align:center;padding:10px;margin-top:8px;background:#6b7280;color:#fff;border-radius:6px;">Cancel</a>

state.onchange=()=>{
 district.innerHTML='<option>Select District</option>';
 mandal.innerHTML='<option>Select Mandal</option>';
 const d=data[state.value]; if(!d) return;
 Object.keys(d).forEach(x=>district.innerHTML+=`<option>${x}</option>`);
};

district.onchange=()=>{
 mandal.innerHTML='<option>Select Mandal</option>';
 let m=data[state.value]?.[district.value]||[];
 m=[...new Set(m.map(x=>x.trim()))].sort();
 m.forEach(x=>mandal.innerHTML+=`<option>${x}</option>`);
};

async function googleLogin(){
 const provider=new GoogleAuthProvider();
 try{
  const result=await signInWithPopup(auth,provider);
  const user=result.user;

  const ref=doc(db,"profiles",user.uid);
  const snap=await getDoc(ref);

  if(!snap.exists()){
    localStorage.setItem("googleUser",JSON.stringify({name:user.displayName,email:user.email}));
    location.reload();
    return;
  }

  window.location.href="https://rakeshkumardhawan.github.io/e-vedhika/";
 }catch(e){alert(e.message)}
}

const gUser=JSON.parse(localStorage.getItem("googleUser")||"null");
if(gUser){
 $("name").value=gUser.name||"";
 $("email").value=gUser.email||"";
 $("email").disabled=true;
 $("password").style.display="none";
 $("confirm").style.display="none";
}

async function register(){
 const username=$("username").value.trim().toLowerCase();
 if(!username) return alert("Username required");

 const email=$("email").value;
 const isGoogle=!!gUser;
 let user;

 try{
  const usernameRef=doc(db,"usernames",username);
  const exists=await getDoc(usernameRef);
  if(exists.exists()) return alert("Username taken");

  if(!isGoogle){
    const p=$("password").value;
    const c=$("confirm").value;
    if(p!==c) return alert("Password mismatch");
    const cred=await createUserWithEmailAndPassword(auth,email,p);
    user=cred.user;
  }else{
    user=auth.currentUser;
  }

  await setDoc(doc(db,"usernames",username),{uid:user.uid});

  await setDoc(doc(db,"profiles",user.uid),{
    username,
    email,
    name:$("name").value,
    mobile:$("mobile").value,
    district:$("district").value,
    mandal:$("mandal").value
  });

  localStorage.removeItem("googleUser");
  alert("Success");
  window.location.href="https://rakeshkumardhawan.github.io/e-vedhika/";

 }catch(e){alert(e.message)}
}
</script>
