<!DOCTYPE html>
<html>
<body>
<h2>Register</h2>

<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password"><br><br>
<input id="username" placeholder="Username"><br><br>

<button onclick="register()">Create</button>

<script type="module">
import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.register = async ()=>{
  let res = await createUserWithEmailAndPassword(auth,email.value,pass.value);

  await setDoc(doc(db,"users",res.user.uid),{
    username:username.value,
    role:"user"
  });

  location.href="login.html";
};
</script>
</body>
</html>
