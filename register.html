state.onchange=()=>{
 district.innerHTML='<option>Select District</option>';
 mandal.innerHTML='<option>Select Mandal</option>';
 const d=data[state.value]; if(!d) return;
 Object.keys(d).forEach(x=>district.innerHTML+=`<option>${x}</option>`);
};

district.onchange=()=>{
 mandal.innerHTML='<option>Select Mandal</option>';
 let m=data[state.value]?.[district.value]||[];

 // ✅ remove duplicates + normalize casing
 const seen=new Set();
 m=m.map(x=>x.trim()).filter(x=>{
   const key=x.toLowerCase();
   if(seen.has(key)) return false;
   seen.add(key);
   return true;
 });

 // optional: sort A-Z
 m.sort((a,b)=>a.localeCompare(b));

 m.forEach(x=>mandal.innerHTML+=`<option>${x}</option>`);
};

window.register=async()=>{
 const username=$("username").value.trim().toLowerCase();
 if(!username) return alert("Username required");
 const e=$("email").value;
 const p=$("password").value;
 const c=$("confirm").value;

 if(p!==c) return alert("Passwords not match");

 try{
  // 🔒 100% unique username using document ID (atomic check)
  const usernameDocRef = doc(db, "usernames", username);
  const usernameSnap = await getDoc(usernameDocRef);
  if(usernameSnap.exists()) return alert("Username already taken ❌");
  const cred=await createUserWithEmailAndPassword(auth,e,p);
  // reserve username first (guarantees uniqueness)
  await setDoc(doc(db,"usernames",username),{uid:cred.user.uid});

  await setDoc(doc(db,"profiles",cred.user.uid),{
   username:username,
   name:$("name").value,
   surname:$("surname").value,
   mobile:$("mobile").value,
   gender:$("gender").value,
   state:$("state").value,
   district:$("district").value,
   mandal:$("mandal").value,
   village:$("village").value
  });

  alert("Signup successful ✅");
  window.location.href="https://rakeshkumardhawan.github.io/e-vedhika/";
 }catch(err){alert(err.message)}
};
