<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Problems & Solutions</title>

<style>
body{
  font-family:Arial;
  background:#eef2f7;
  margin:0;
  text-align:center;
}

/* HEADER */
.header{
  background:#0077b6;
  color:white;
  padding:20px;
}

/* SEARCH */
.search input{
  width:70%;
  padding:10px;
  margin:15px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* CATEGORY */
.categories{
  margin:10px;
}

.cat{
  display:inline-block;
  padding:8px 15px;
  margin:5px;
  background:#caf0f8;
  border-radius:20px;
  cursor:pointer;
}

/* CARDS */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:white;
  width:280px;
  margin:10px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.title{
  font-weight:bold;
}

.date{
  font-size:12px;
  color:gray;
}
</style>

</head>

<body>

<div class="header">
  <h2>📌 Problems & Solutions</h2>
  <p>Find and share solutions</p>
</div>

<!-- SEARCH -->
<div class="search">
  <input type="text" id="search" placeholder="Search problems...">
</div>

<!-- CATEGORY -->
<div class="categories">
  <span class="cat" onclick="filterCat('all')">All</span>
  <span class="cat" onclick="filterCat('EPFO')">EPFO</span>
  <span class="cat" onclick="filterCat('Aadhar')">Aadhar</span>
  <span class="cat" onclick="filterCat('Payments')">Payments</span>
  <span class="cat" onclick="filterCat('House Tax')">House Tax</span>
</div>

<!-- DATA -->
<div class="grid" id="data"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyC_oLAFLdpErutmSmR9bQnm0ETq5hd9qnU",
  authDomain:"e-vedhika-258f2.firebaseapp.com",
  projectId:"e-vedhika-258f2"
});

const db = getFirestore(app);

let fullData=[];

/* LOAD DATA */
async function loadData(){
  let qs = await getDocs(collection(db,"posts"));
  let arr=[];

  qs.forEach(d=>{
    let x=d.data();

    // 🔥 ONLY APPROVED POSTS
    if(x.status==="Approved"){
      arr.push({...x});
    }
  });

  // 🔥 SORT latest first
  arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  fullData=arr;
  display(arr);
}

function display(arr){
  let box=document.getElementById("data");
  box.innerHTML="";

  arr.forEach(d=>{
    box.innerHTML+=`
    <div class="card">
      <div class="title">${d.title||"No Title"}</div>
      <div>${d.content||""}</div>
      <div class="date">${formatDate(d)}</div>
      <div><b>${d.category||""}</b></div>
    </div>`;
  });
}

/* DATE */
function formatDate(d){
  if(d.createdAt?.seconds){
    let dt=new Date(d.createdAt.seconds*1000);
    return dt.toLocaleString('en-IN',{hour12:true});
  }
  return "";
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
  let val=this.value.toLowerCase();

  let filtered=fullData.filter(d=>{
    return (d.title+" "+d.content).toLowerCase().includes(val);
  });

  display(filtered);
});

/* CATEGORY */
window.filterCat=(cat)=>{
  if(cat==="all"){
    display(fullData);
  }else{
    let f=fullData.filter(d=>d.category===cat);
    display(f);
  }
};

loadData();

</script>

</body>
</html>
